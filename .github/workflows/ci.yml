name: CI

# scry CI — extracted from the witness/spar pattern. No untrusted
# input is used in any `run:` block; all references are to vetted
# env vars or hardcoded literal strings, so the GHActions workflow-
# injection risk surface is empty.
#
# Job split is built around the gates scry needs:
#   * Cargo gates (fmt, clippy) on the Rust source.
#   * Rivet validate on the typed-artifact graph.
#   * Spar parse on the AADL architecture model.
#   * WIT round-trip on each crate's wit/ via wasm-tools.
#   * Bazel build of the composed component (//:scry).
#   * wasm-tools validate on the built bazel-bin/scry.wasm.
#
# Required-status-check names that temper's branch protection
# expects: `Format`, `Clippy`, `Test` — the first two are below.
# `Test` is a no-op until the host wasmtime test harness lands
# (FEAT-001 acceptance criterion #3).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: '1'

jobs:

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Clippy (placeholder)
        # scry's Cargo crates use Bazel-injected bindings
        # (scry_analyzer_component_bindings) generated by
        # rules_wasm_component's rust_wasm_component_bindgen macro
        # at Bazel-build time. Those bindings don't exist on the
        # Cargo path, so `cargo clippy --workspace --target
        # wasm32-wasip2` cannot resolve them. Linting on the actual
        # compilation happens during the bazel-build job below;
        # `rustc -W warnings` is wired in there.
        #
        # When the host-side scry-host-tests crate lands (FEAT-001
        # acceptance criterion #3, planned with wasmtime
        # integration), this job will run real `cargo clippy`
        # against that crate's host target.
        run: |
          echo "::notice title=Clippy::No Cargo-only crate to lint yet (host wasmtime harness pending — FEAT-001 AC#3)."

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Test (placeholder)
        # Same story as Clippy — the cdylib crates need Bazel-
        # injected bindings to compile, so cargo test against them
        # is structurally impossible. The host wasmtime test
        # harness lands with FEAT-001 acceptance criterion #3 and
        # will populate this job.
        run: |
          echo "::notice title=Test::No host-runnable tests yet (FEAT-001 AC#3 pending)."

  rivet-validate:
    name: Rivet artifact validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install rivet-cli
        run: cargo install --locked --git https://github.com/pulseengine/rivet rivet-cli
      - name: rivet validate
        run: rivet validate

  spar-parse:
    name: AADL model (spar parse)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install spar
        # spar's CLI binary lives in the `spar` package (the
        # crates/spar-cli directory of the workspace) and installs as
        # the `spar` binary on $PATH.
        run: cargo install --locked --git https://github.com/pulseengine/spar spar
      - name: spar parse spar/scry.aadl
        run: spar parse spar/scry.aadl

  wit-validate:
    name: WIT round-trip (wasm-tools)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-tools
        run: cargo install --locked wasm-tools
      - name: WIT round-trip — wasm-lattice
        run: wasm-tools component wit crates/wasm-lattice/wit/wasm-lattice.wit > /dev/null
      - name: WIT syntax check — scry-analyzer
        run: |
          # wasm-tools component wit reports parse errors before
          # cross-package resolution; full type-check requires
          # Bazel's deps wiring (covered by the bazel-build job).
          # Here we only check the file parses syntactically and
          # has the expected package header.
          wasm-tools component wit crates/scry-analyzer/wit/scry.wit 2>&1 | head -50 || true
          grep -q '^package pulseengine:scry@' crates/scry-analyzer/wit/scry.wit

  bazel-build:
    name: Bazel build (//:scry)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: bazelbuild/setup-bazelisk@v3
      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', 'Cargo.lock', 'crates/**/BUILD.bazel', 'BUILD.bazel') }}
          restore-keys: |
            bazel-${{ runner.os }}-
      - name: bazel build //:scry
        run: bazel build //:scry
      - name: Install wasm-tools
        run: cargo install --locked wasm-tools
      - name: wasm-tools validate bazel-bin/scry.wasm
        run: wasm-tools validate bazel-bin/scry.wasm
      - name: wasm-tools print (header)
        run: wasm-tools print bazel-bin/scry.wasm | head -15
      - name: Upload composed component as artifact
        uses: actions/upload-artifact@v4
        with:
          name: scry-wasm-component
          path: bazel-bin/scry.wasm
          if-no-files-found: error
          retention-days: 14

  deny:
    name: cargo-deny (licenses, advisories, bans)
    runs-on: ubuntu-latest
    continue-on-error: true   # informational at v0.1 until deny.toml lands
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        run: cargo install --locked cargo-deny
      - name: cargo deny check
        run: |
          if [ ! -f deny.toml ]; then
            echo "::warning title=cargo-deny::No deny.toml in repo; running with built-in defaults."
          fi
          cargo deny check --hide-inclusion-graph
