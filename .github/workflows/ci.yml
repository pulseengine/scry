name: CI

# scry CI — extracted from the witness/spar pattern. No untrusted
# input is used in any `run:` block; all references are to vetted
# env vars or hardcoded literal strings, so the GHActions workflow-
# injection risk surface is empty.
#
# Job split is built around the gates scry needs:
#   * Cargo gates (fmt, clippy, test) on the Rust source.
#       — fmt:    cargo fmt --check on the whole workspace.
#       — clippy: real `cargo clippy --package scry-host-tests
#                 --all-targets -- -D warnings` (FEAT-001 AC#3).
#       — test:   bazel-builds //:scry first to produce the composed
#                 `bazel-bin/scry.wasm`, then runs the host wasmtime
#                 harness via `cargo test --package scry-host-tests`.
#   * Rivet validate on the typed-artifact graph.
#   * Spar parse on the AADL architecture model.
#   * WIT round-trip on each crate's wit/ via wasm-tools.
#   * Bazel build of the composed component (//:scry).
#   * wasm-tools validate on the built bazel-bin/scry.wasm.
#
# Required-status-check names that temper's branch protection
# expects: `Format`, `Clippy`, `Test` — all three are real Cargo
# gates as of FEAT-001 AC#3.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: '1'

jobs:

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # scry's wasm-component crates (wasm-lattice, scry-analyzer)
      # depend on Bazel-injected bindings that don't exist on the
      # cargo path; `cargo clippy --workspace --target wasm32-wasip2`
      # cannot resolve them. Linting on the wasm side happens during
      # the bazel-build job below (rustc -W warnings is wired in
      # there).
      #
      # On the cargo path we lint only the native host harness
      # (scry-host-tests). `--all-targets` picks up tests/, examples/,
      # and benches/ in addition to the lib stub; `-D warnings`
      # promotes clippy to a hard gate per the witness/spar pattern.
      - name: cargo clippy --package scry-host-tests
        run: cargo clippy --package scry-host-tests --all-targets -- -D warnings
      # FEAT-002: the pure meld<->scry boundary crate also lints on the
      # cargo path (it compiles natively as well as to wasm32-wasip2).
      - name: cargo clippy --package scry-sai-provenance
        run: cargo clippy --package scry-sai-provenance --all-targets -- -D warnings
      # FEAT-009: the pure security-label (taint) lattice crate also
      # lints on the cargo path (it compiles natively as well as to
      # wasm32-wasip2, where wasm-lattice's WIT label-* exports delegate
      # to it).
      - name: cargo clippy --package scry-sai-taint
        run: cargo clippy --package scry-sai-taint --all-targets -- -D warnings
      # FEAT-010: the pure octagon relational-domain crate also lints on
      # the cargo path (it compiles natively as well as to
      # wasm32-wasip2, where wasm-lattice's WIT octagon-* exports
      # delegate to it).
      - name: cargo clippy --package scry-sai-octagon
        run: cargo clippy --package scry-sai-octagon --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Nix
        # Same Nix-toolchain rationale as the bazel-build job:
        # FEAT-012's Rocq toolchain is registered unconditionally
        # in MODULE.bazel and resolved during analysis even for
        # `bazel build //:scry`.
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: bazelbuild/setup-bazelisk@v3
      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-test-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', 'Cargo.lock', 'crates/**/BUILD.bazel', 'BUILD.bazel') }}
          restore-keys: |
            bazel-test-${{ runner.os }}-
      - name: bazel build //:scry
        # Produces the composed component at `bazel-bin/scry.wasm`
        # that the host harness loads via wasmtime. The harness
        # skips with a notice if the file is absent, so we materialize
        # it here BEFORE running cargo test.
        run: bazel build //:scry
      - name: cargo test --package scry-host-tests
        # SCRY_COMPONENT_PATH defaults to <workspace>/bazel-bin/scry.wasm
        # which is where `bazel build //:scry` puts the artifact. No
        # override needed in CI; the env var is supported for local
        # iteration where bazel-bin may be elsewhere.
        run: cargo test --package scry-host-tests -- --nocapture
      - name: cargo test --package scry-sai-provenance
        # FEAT-002: inline encode/decode/project unit tests for the
        # meld<->scry boundary crate (the same source the analyzer
        # links into the wasm component). The provenance round-trip is
        # additionally exercised through scry-host-tests/tests/provenance.rs.
        run: cargo test --package scry-sai-provenance -- --nocapture
      # FEAT-009: the security-label lattice kill-criterion — the label
      # lattice obeys its algebraic laws and forward propagation never
      # moves down the lattice (exhaustive over the height-1 lattice).
      # The same crate links into the wasm component; the host harness
      # (tests/taint.rs) re-exercises it on the cargo path.
      - name: cargo test --package scry-sai-taint
        run: cargo test --package scry-sai-taint -- --nocapture
      # FEAT-010: the octagon relational-domain kill-criterion — the DBM
      # operations are sound w.r.t. the concretization γ (closure
      # preserves γ; join over-approximates the union; meet =
      # intersection). The same crate links into the wasm component; the
      # host harness (tests/octagon.rs) re-exercises it on the cargo
      # path. The Rocq interval-soundness proof
      # (proofs/rocq/Soundness.v) is gated by the dedicated Rocq job.
      - name: cargo test --package scry-sai-octagon
        run: cargo test --package scry-sai-octagon -- --nocapture
      # FEAT-011: the full-stack Rocq soundness proofs (Soundness /
      # Region / CallGraph / Reachability) are gated by the dedicated
      # Rocq Formal Proofs job (bazel test //proofs/rocq/...).

  rivet-validate:
    name: Rivet artifact validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install rivet-cli
        run: cargo install --locked --git https://github.com/pulseengine/rivet rivet-cli
      - name: rivet validate
        run: rivet validate

  # A README is a claim about the system — the same species as a requirement,
  # gated the same way. `claim-check` re-derives every load-bearing doc claim
  # (version, admit-free proof count, published-crate count, WrapAdd.v, the
  # scoped-soundness wording) from live source and fails the build on drift —
  # so the status section can't silently rot ~40 versions again (issue #97).
  claim-check:
    name: Doc claims (claim-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: claim-check claims.yaml
        run: python3 tools/claim-check.py claims.yaml

  spar-parse:
    name: AADL model (spar parse)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install spar
        # spar's CLI binary lives in the `spar` package (the
        # crates/spar-cli directory of the workspace) and installs as
        # the `spar` binary on $PATH.
        run: cargo install --locked --git https://github.com/pulseengine/spar spar
      - name: spar parse spar/scry.aadl
        run: spar parse spar/scry.aadl

  wit-validate:
    name: WIT round-trip (wasm-tools)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-tools
        run: cargo install --locked wasm-tools
      - name: WIT round-trip — wasm-lattice
        run: wasm-tools component wit crates/wasm-lattice/wit/wasm-lattice.wit > /dev/null
      - name: WIT syntax check — scry-analyzer
        run: |
          # wasm-tools component wit reports parse errors before
          # cross-package resolution; full type-check requires
          # Bazel's deps wiring (covered by the bazel-build job).
          # Here we only check the file parses syntactically and
          # has the expected package header.
          wasm-tools component wit crates/scry-analyzer/wit/scry.wit 2>&1 | head -50 || true
          grep -q '^package pulseengine:scry@' crates/scry-analyzer/wit/scry.wit

  bazel-build:
    name: Bazel build (//:scry)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Install Nix
        # FEAT-012: scry's MODULE.bazel registers the Rocq toolchain
        # unconditionally (mirroring synth's pattern), which forces
        # Bazel to resolve `@rocq_toolchains` during analysis even
        # for `bazel build //:scry`. Install Nix so the resolution
        # succeeds. The actual Rocq build is exercised only by the
        # dedicated Rocq Formal Proofs job (rocq-proofs.yml).
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: bazelbuild/setup-bazelisk@v3
      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', 'Cargo.lock', 'crates/**/BUILD.bazel', 'BUILD.bazel') }}
          restore-keys: |
            bazel-${{ runner.os }}-
      - name: bazel build //:scry
        run: bazel build //:scry
      - name: Install wasm-tools
        run: cargo install --locked wasm-tools
      - name: wasm-tools validate bazel-bin/scry.wasm
        run: wasm-tools validate bazel-bin/scry.wasm
      - name: wasm-tools print (header)
        run: wasm-tools print bazel-bin/scry.wasm | head -15
      - name: Upload composed component as artifact
        uses: actions/upload-artifact@v4
        with:
          name: scry-wasm-component
          path: bazel-bin/scry.wasm
          if-no-files-found: error
          retention-days: 14

  deny:
    name: cargo-deny (licenses, advisories, bans)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        run: cargo install --locked cargo-deny
      - name: cargo deny check
        run: cargo deny check --hide-inclusion-graph

  mcdc:
    name: MC/DC (witness)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # FEAT-014 rollout: the witness MC/DC pipeline runs on every change over
    # the REAL analyzer core (crates/scry-analyze-core, driven by
    # crates/scry-mcdc), so a code change that drops a proved condition turns
    # the build red — REQ-010 is a live oracle, not a one-shot release
    # artifact. The job also publishes the static truth-table visualisation.
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
      # witness lives in a sibling repo (pulseengine/witness); pin the rev so
      # the coverage numbers are reproducible and the gate is deterministic.
      # Cache the two built binaries keyed by that rev so we don't rebuild
      # witness (~several min) on every run.
      - name: Cache witness binaries
        id: witness-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/witness
            ~/.cargo/bin/witness-viz
          key: witness-bins-${{ runner.os }}-6ff96e75a1b495aa165f1ee91abda3049fffe628
      - name: Install witness + witness-viz (pinned rev)
        if: steps.witness-cache.outputs.cache-hit != 'true'
        run: |
          REV=6ff96e75a1b495aa165f1ee91abda3049fffe628
          URL=https://github.com/pulseengine/witness.git
          cargo install --git "$URL" --rev "$REV" witness-mcdc
          cargo install --git "$URL" --rev "$REV" witness-mcdc-viz
      - name: Run MC/DC gate (witness pipeline + baseline assertion + viz)
        run: ./crates/scry-mcdc/mcdc-gate.sh
        env:
          MCDC_SITE_DIR: ${{ github.workspace }}/mcdc-viz-site
      - name: Upload MC/DC truth-table visualisation
        uses: actions/upload-artifact@v4
        with:
          name: scry-mcdc-viz
          path: ${{ github.workspace }}/mcdc-viz-site
          if-no-files-found: error
          retention-days: 14
      # FEAT-025 dogfood: run scry on its OWN compiled module (the analyzer
      # core, already built above as scry_mcdc.wasm) and render the analysis
      # with scry-viz (FEAT-024). "scry visualizing scry." This is also a
      # robustness oracle — a panic / error analyzing a real, large,
      # compiler-emitted module turns the build red, where the tiny fixtures
      # cannot reach.
      # FEAT-031 (FEAT-025 slice-2): a LIVE robustness GATE — analyze scry's own
      # module and assert the result is structurally well-formed (no inverted
      # interval, 64-hex sha, gapless function metadata, sorted reachable set).
      # A violation is a scry bug and turns the build red (exit 5). This runs
      # before the render so a malformed result fails loudly, not silently.
      - name: Dogfood gate — scry-viz check on scry's own module (FEAT-031)
        run: |
          cargo run --release -p scry-sai-viz -- check \
            crates/scry-mcdc/target/wasm32-wasip1/release/scry_mcdc.wasm
      - name: Dogfood — scry-viz on scry's own module (FEAT-025)
        run: |
          cargo run --release -p scry-sai-viz -- \
            crates/scry-mcdc/target/wasm32-wasip1/release/scry_mcdc.wasm \
            -o "${{ github.workspace }}/scry-self-analysis.html" \
            --title "scry analyzing scry (scry_mcdc.wasm)"
      - name: Upload scry self-analysis
        uses: actions/upload-artifact@v4
        with:
          name: scry-self-analysis
          path: ${{ github.workspace }}/scry-self-analysis.html
          if-no-files-found: error
          retention-days: 14
