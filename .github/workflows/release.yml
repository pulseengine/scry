name: Release

# scry release workflow — extracted from the sigil/witness hybrid
# pattern. Triggers on a `v*` tag push (e.g. `v0.1.0`) and ships:
#   * the composed Wasm component artifact (bazel-bin/scry.wasm)
#   * a CycloneDX SBOM for the workspace
#   * SHA256SUMS over all release assets
#   * cosign keyless OIDC signatures
#   * SLSA v1 provenance via actions/attest-build-provenance
#   * a GitHub Release entry uploading all of the above
#
# Workflow-injection safety: every value sourced from outside the
# workflow file (tag name, optional dispatch input) is routed
# through `env:` first; no `${{ ... }}` interpolation appears inline
# in any `run:` block. `env:`-set values are quoted on use.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0). Must already exist.'
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:

  release:
    name: Build, sign, and release
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version from tag
        env:
          TAG_REF: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_TAG:-}" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$TAG_REF"
          fi
          case "$TAG" in
            v*) ;;
            *)  echo "::error::tag '$TAG' must start with v"; exit 1 ;;
          esac
          BARE="${TAG#v}"
          echo "VERSION=$TAG" >> "$GITHUB_ENV"
          echo "BARE_VERSION=$BARE" >> "$GITHUB_ENV"

      - name: Install Nix
        # FEAT-012: scry's MODULE.bazel registers the Rocq toolchain
        # unconditionally (mirroring synth's pattern), which forces
        # Bazel to resolve `@rocq_toolchains` (via rules_nixpkgs) during
        # analysis even for `bazel build //:scry`. Without nix-build on
        # PATH that resolution fails with "Platform is not supported:
        # nix-build not found in PATH". The CI `bazel-build` and `test`
        # jobs already install Nix for exactly this reason; the release
        # job must too. Earlier releases only survived on a warm Bazel
        # cache that already held the nix-fetched repo — a fragile
        # accident that broke the moment a BUILD.bazel / Cargo.lock
        # change rotated the cache key (v0.7.0).
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: bazelbuild/setup-bazelisk@v3

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-release-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', 'Cargo.lock', 'crates/**/BUILD.bazel', 'BUILD.bazel') }}
          restore-keys: |
            bazel-release-${{ runner.os }}-
            bazel-${{ runner.os }}-

      - name: bazel build //:scry
        run: bazel build //:scry

      - name: Stage release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          ASSET="scry-${BARE_VERSION}-wasm32-wasip2.wasm"
          cp bazel-bin/scry.wasm "release-assets/${ASSET}"
          echo "ASSET=$ASSET" >> "$GITHUB_ENV"
          ls -la release-assets/

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-cyclonedx
        run: cargo install --locked cargo-cyclonedx

      - name: Generate workspace SBOM
        run: |
          set -euo pipefail
          cargo cyclonedx --format json --spec-version 1.5
          find crates -name '*.cdx.json' | while read -r f; do
            base=$(basename "$f" .cdx.json)
            cp "$f" "release-assets/${base}-${BARE_VERSION}.cdx.json"
          done
          ls -la release-assets/

      # ── Rivet compliance evidence bundle ─────────────────────────
      #
      # Generated via the canonical PulseEngine composite action
      # (pulseengine/rivet/.github/actions/compliance) — same one
      # sigil and spar use. Produces an HTML compliance report plus
      # ReqIF / generic-yaml data formats and tarballs them as
      # compliance-evidence-<version>.tar.gz. The tarball is added
      # to release-assets/ so cosign signs it alongside the other
      # release artifacts in the next step.

      - name: Generate rivet compliance evidence
        id: compliance
        continue-on-error: true
        uses: pulseengine/rivet/.github/actions/compliance@v0.6.0
        with:
          # v0.3.0 was too old to parse scry's research-ext schema —
          # the action's internal `rivet validate` failed on v0.2.0
          # (see issue #10). v0.13.1 matches the rivet release line.
          rivet-version: v0.13.1
          theme: dark
          archive: 'true'
          archive-name: scry-${{ env.BARE_VERSION }}-compliance-evidence
          report-label: ${{ env.VERSION }}

      - name: Stage compliance bundle
        env:
          ARCHIVE_PATH: ${{ steps.compliance.outputs.archive-path }}
        run: |
          set -euo pipefail
          if [ -n "${ARCHIVE_PATH:-}" ] && [ -f "$ARCHIVE_PATH" ]; then
            cp "$ARCHIVE_PATH" "release-assets/$(basename "$ARCHIVE_PATH")"
            echo "::notice title=Compliance evidence::staged $(basename "$ARCHIVE_PATH")"
          else
            echo "::warning title=Compliance evidence::action emitted no archive-path; skipping"
          fi
          ls -la release-assets/

      - name: Generate SHA256SUMS.txt
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum -- * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Sign release assets (per-asset)
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          set -euo pipefail
          cd release-assets
          for asset in *.wasm *.cdx.json *.tar.gz; do
            [ -f "$asset" ] || continue
            cosign sign-blob --yes \
              --output-signature "${asset}.sig" \
              --output-certificate "${asset}.pem" \
              "$asset"
          done

      - name: Sign SHA256SUMS.txt (cosign bundle)
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          set -euo pipefail
          cd release-assets
          cosign sign-blob --yes \
            --bundle SHA256SUMS.txt.cosign.bundle \
            --output-signature SHA256SUMS.txt.sig \
            --output-certificate SHA256SUMS.txt.pem \
            SHA256SUMS.txt

      - name: Attest build provenance (SLSA v1)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release-assets/${{ env.ASSET }}

      - name: Extract release notes from CHANGELOG.md
        run: |
          set -euo pipefail
          if [ ! -f CHANGELOG.md ]; then
            echo "(no CHANGELOG.md)" > release-notes.md
            exit 0
          fi
          awk -v ver="$BARE_VERSION" '
            $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "(no entry for ${BARE_VERSION} in CHANGELOG.md)" > release-notes.md
          fi
          cat release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file release-notes.md \
            --verify-tag \
            release-assets/*

  # ── MC/DC evidence bundle (witness) ──────────────────────────────────
  #
  # Publishes scry's witness MC/DC evidence as
  # `scry-vX.Y.Z-mcdc-evidence.tar.gz` so pulseengine.eu's fetch-reports
  # surfaces it under the Reports page "MC/DC Coverage" section, exactly
  # like rivet compliance reports. The bundle is built by witness's own
  # compliance composite action (fed scry's run.json + module paths) so it
  # carries the canonical verdict-evidence/suite-index.html viewer the
  # website links to. Runs after the release exists and uploads to it.
  #
  # ⚠ NEEDS VALIDATION WITH A TEST RELEASE. Three scry-specific assumptions
  # below are unverified until a tag is cut:
  #   1. witness v0.30.0 binaries build/run scry's mcdc harness cleanly
  #      (scry's CI gate pins an older rev; floors are disabled here since
  #      ci.yml already enforces the gate — this job only packages evidence).
  #   2. the `modules` paths match what mcdc-gate.sh actually emits.
  #   3. the compliance action @v0.30.0 ↔ run.json schema agree.
  # After a pre-release tag, confirm the uploaded tarball contains
  # `verdict-evidence/suite-index.html` before relying on it.
  mcdc-evidence:
    name: MC/DC evidence bundle
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      WITNESS_VERSION: v0.30.0
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version from tag
        env:
          TAG_REF: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          TAG="${INPUT_TAG:-$TAG_REF}"
          case "$TAG" in v*) ;; *) echo "::error::tag '$TAG' must start with v"; exit 1 ;; esac
          echo "VERSION=$TAG" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Install witness + witness-viz (${{ env.WITNESS_VERSION }})
        run: |
          set -euo pipefail
          URL=https://github.com/pulseengine/witness.git
          cargo install --git "$URL" --tag "$WITNESS_VERSION" witness-mcdc
          cargo install --git "$URL" --tag "$WITNESS_VERSION" witness-mcdc-viz
          witness --version

      - name: Produce MC/DC run record (floors disabled — gate enforced in CI)
        env:
          MCDC_PROVED_FLOOR: '0'
          MCDC_FULL_FLOOR: '0'
        run: ./crates/scry-mcdc/mcdc-gate.sh

      - name: Build evidence bundle (witness compliance action)
        id: evidence
        uses: pulseengine/witness/.github/actions/compliance@v0.30.0
        with:
          report-label: ${{ env.VERSION }}
          run-json: crates/scry-mcdc/evidence/run.json
          modules: >-
            [{"original":"crates/scry-mcdc/target/wasm32-wasip1/release/scry_mcdc.wasm",
              "instrumented":"crates/scry-mcdc/evidence/scry-mcdc.instrumented.wasm",
              "harness":"crates/scry-mcdc/evidence/scry-mcdc.instrumented.wasm"}]
          archive: 'true'
          archive-name: scry-${{ env.VERSION }}-mcdc-evidence

      - name: Upload MC/DC evidence to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARCHIVE_PATH: ${{ steps.evidence.outputs.archive-path }}
        run: |
          set -euo pipefail
          if [ -z "${ARCHIVE_PATH:-}" ] || [ ! -f "$ARCHIVE_PATH" ]; then
            echo "::error::compliance action produced no archive-path"; exit 1
          fi
          gh release upload "$VERSION" "$ARCHIVE_PATH" --clobber
          echo "::notice title=MC/DC evidence::uploaded $(basename "$ARCHIVE_PATH")"

  # ── GitHub Pages: scry verification dashboard (FEAT-026) ─────────────────
  #
  # Same delivery pattern as witness's release.yml `publish-pages` job
  # (actions/upload-pages-artifact + actions/deploy-pages; Pages Source =
  # "GitHub Actions"). Builds a single self-contained dashboard under dist/ and
  # deploys it to https://pulseengine.github.io/scry/:
  #   * dist/self-analysis.html — scry-viz analyzing scry's OWN compiled module
  #     (FEAT-024/025: functions, call graph, diagnostics, per-program-point
  #     invariants incl. the operand stack);
  #   * dist/mcdc/            — the witness-viz MC/DC truth-table dashboard over
  #     scry's real analyzer corpus (same site CI uploads as an artifact);
  #   * dist/index.html       — a landing page (scry-viz index) linking both.
  #
  # Two one-time repo settings (mirroring witness; applied out of band so a
  # fresh fork must redo them):
  #   1. Pages → Source = "GitHub Actions" (not "Branch"), else deploy-pages
  #      fails with a setting-pointing error.
  #   2. The `github-pages` environment's default deployment-branch policy only
  #      allows `main`; tag-triggered deploys need a `v*` TAG policy:
  #        gh api -X POST repos/pulseengine/scry/environments/github-pages/deployment-branch-policies \
  #          -f name='v*' -f type=tag
  #
  # witness binaries are pinned to the SAME rev the CI MC/DC gate uses (proven
  # green), and floors are disabled here — CI already enforces the gate; this
  # job only renders the dashboard.
  publish-pages:
    name: Publish verification dashboard to GitHub Pages
    needs: [release]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    env:
      WITNESS_REV: 6ff96e75a1b495aa165f1ee91abda3049fffe628
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version from tag
        env:
          TAG_REF: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          TAG="${INPUT_TAG:-$TAG_REF}"
          case "$TAG" in v*) ;; *) echo "::error::tag '$TAG' must start with v"; exit 1 ;; esac
          echo "VERSION=$TAG" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2

      - name: Cache witness binaries
        id: witness-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/witness
            ~/.cargo/bin/witness-viz
          key: witness-bins-${{ runner.os }}-6ff96e75a1b495aa165f1ee91abda3049fffe628
      - name: Install witness + witness-viz (pinned rev)
        if: steps.witness-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          URL=https://github.com/pulseengine/witness.git
          cargo install --git "$URL" --rev "$WITNESS_REV" witness-mcdc
          cargo install --git "$URL" --rev "$WITNESS_REV" witness-mcdc-viz

      # Builds scry_mcdc.wasm AND renders the witness-viz MC/DC dashboard into
      # dist/mcdc (floors disabled — CI is the gate).
      - name: Render MC/DC dashboard (witness-viz)
        env:
          MCDC_SITE_DIR: ${{ github.workspace }}/dist/mcdc
          MCDC_PROVED_FLOOR: '0'
          MCDC_FULL_FLOOR: '0'
        run: |
          set -euo pipefail
          mkdir -p dist
          ./crates/scry-mcdc/mcdc-gate.sh

      - name: Render scry-viz self-analysis (scry on scry)
        run: |
          set -euo pipefail
          # FEAT-031 gate first: a malformed self-analysis fails the deploy.
          cargo run --release -p scry-sai-viz -- check \
            crates/scry-mcdc/target/wasm32-wasip1/release/scry_mcdc.wasm
          cargo run --release -p scry-sai-viz -- \
            crates/scry-mcdc/target/wasm32-wasip1/release/scry_mcdc.wasm \
            -o "$GITHUB_WORKSPACE/dist/self-analysis.html" \
            --title "scry ${VERSION} — self-analysis (scry_mcdc.wasm)"

      - name: Build landing page (scry-viz index)
        run: |
          set -euo pipefail
          cargo run --release -p scry-sai-viz -- index \
            --site-dir "$GITHUB_WORKSPACE/dist" \
            --title "scry ${VERSION} — verification dashboard"

      - name: Sanity-check the site (every page is a complete HTML document)
        run: |
          set -euo pipefail
          test -f dist/index.html
          test -f dist/self-analysis.html
          find dist -name '*.html' -print0 \
            | xargs -0 -I{} sh -c 'head -c 64 "{}" | grep -qi "<!doctype html>" || (echo "::error::{} missing doctype" && exit 1)'
          echo "=== site tree (top level) ===" && find dist -maxdepth 1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
