# cargo-deny configuration for scry.
# https://embarkstudios.github.io/cargo-deny/
#
# Copied from the witness/rivet pattern to match the PulseEngine
# family allowlist. Adjust as scry takes on new dependencies; any
# license not in `allow` below blocks the CI deny job.

[advisories]
# Vulnerabilities are denied by default in cargo-deny >=0.16.
# Yanked crates produce warnings by default.
ignore = [
    # RUSTSEC-2026-0182 — memory LEAK (not RCE) in wasmtime's WASIp1
    # `fd_renumber`. Reached only through `wasmtime-wasi`, a DEV-dependency of
    # the `scry-host-tests` harness (which runs the composed component in a
    # short-lived wasmtime embedding); it is NOT in the shipped `scry.wasm`
    # analyzer component (which imports only WASI as a guest, and embeds no
    # wasmtime). A per-run leak in the test harness has no security impact on
    # the released artifact. Re-evaluate when wasmtime is bumped past the
    # patched release.
    "RUSTSEC-2026-0182",
    # RUSTSEC-2026-0188 — WASI hard links / renames bypass `wasmtime-wasi`'s
    # `FilePerms` for the destination path. Same reachability as 0182: only via
    # `wasmtime-wasi`, a DEV-dependency of the `scry-host-tests` harness, and
    # NOT in the shipped `scry.wasm` (which embeds no wasmtime and grants the
    # harness no host filesystem the test inputs could abuse). No security
    # impact on the released artifact. Re-evaluate when wasmtime is bumped.
    "RUSTSEC-2026-0188",
    # RUSTSEC-2026-0190 — unsoundness in `anyhow`'s `Error::downcast_mut()`
    # after `Error::context` (a borrow-rule / UB violation). `anyhow` enters the
    # graph ONLY through `scry-host-tests` (directly + via wasmtime/jsonschema)
    # and is in ZERO published `scry-sai-*` libraries; the harness uses it for
    # terse test-error plumbing and does not exercise the affected
    # context-then-downcast_mut pattern. No impact on shipped crates or the
    # analyzer component. Re-evaluate when a patched `anyhow` is pulled in.
    "RUSTSEC-2026-0190",
    # RUSTSEC-2026-0204 — invalid pointer deref in `crossbeam-epoch`'s
    # `fmt::Pointer` impl for `Atomic`/`Shared` (only when printing an already-
    # invalid pointer). Enters the graph ONLY through `scry-host-tests` →
    # wasmtime → rayon → crossbeam-deque → crossbeam-epoch; it is in ZERO
    # published `scry-sai-*` libraries and not in the shipped `scry.wasm`. The
    # harness does not format crossbeam pointers. No impact on shipped crates or
    # the analyzer component. Re-evaluate when wasmtime/rayon are bumped.
    "RUSTSEC-2026-0204",
]

[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "0BSD",
    "BSL-1.0",
    "CC0-1.0",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
