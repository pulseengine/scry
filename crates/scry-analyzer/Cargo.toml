[package]
name = "scry-analyzer"
version = "0.1.0"
edition = "2021"
description = "v0.1 scry interval-domain abstract interpreter as a Wasm component."
license = "MIT OR Apache-2.0"

[lib]
crate-type = ["cdylib"]

[dependencies]
bitflags = { workspace = true }

