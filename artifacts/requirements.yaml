artifacts:

  # ──────────────────────────────────────────────────────────────────────
  # Requirements — what the abstract-interpretation pass must do.
  # ──────────────────────────────────────────────────────────────────────

  - id: REQ-001
    type: requirement
    title: Provide a sound abstract-interpretation pass over the Wasm Core Model
    status: draft
    description: >
      The PulseEngine pipeline shall include a sound abstract-interpretation
      pass that operates on validated Wasm Core Model modules. "Sound" in
      the AI sense (per AC-001): the abstract semantics computed by the
      analyzer over-approximates the set of concrete reachable behaviors —
      the analyzer is allowed to flag unreachable behavior (false alarm)
      but must not miss any real reachable behavior.
    tags: [core, abstract-interpretation, soundness]
    fields:
      priority: must
      category: functional
    links:
      - type: references-paper
        target: AC-001

  - id: REQ-002
    type: requirement
    title: Soundness shall be stated and (longer term) mechanically proven against the official Wasm semantics
    status: draft
    description: >
      The soundness statement for the AI pass shall be formulated as
      over-approximation of the collecting semantics derived from the
      official Wasm operational semantics (AC-002). For each abstract
      domain shipped, a soundness theorem of the form
        ∀σ ∈ ⟦M⟧concrete : α(σ) ⊑ ⟦M⟧abstract
      shall be stated in the design documentation. Mechanized proof
      against WasmCert-Coq (AC-003, TE-004) is the long-term target;
      the v0 ship is allowed to carry the soundness theorem as a
      paper-only claim with a clearly named obligation in the safety case.
    tags: [soundness, mechanization]
    fields:
      priority: must
      category: non-functional
    links:
      - type: references-paper
        target: AC-002
      - type: references-paper
        target: AC-003
      - type: evaluates-tech
        target: TE-004

  - id: REQ-003
    type: requirement
    title: Extend the AI pass to the Wasm Component Model
    status: draft
    description: >
      The AI pass shall, in a second phase, lift to the Wasm Component
      Model: resource lifetimes for owned/borrowed handles, capability
      flow through component imports, host-call effect tracking, and
      (Preview 3) async/WasmFX-style continuation reasoning. The Menon
      & Wagner WAW 2025 talk (AC-009) notes the Component Model is a
      linking/interface language whose execution intertwines with Core
      Wasm — soundness structures may need to be inspired by multi-
      language semantics. The PulseEngine AI pass shall be designed to
      accommodate that.
    tags: [component-model, capability, resource-lifetime]
    fields:
      priority: must
      category: functional
    links:
      - type: references-paper
        target: AC-009
      - type: addresses-finding
        target: MF-002

  - id: REQ-004
    type: requirement
    title: Surface AI invariants as machine-consumable annotations for the loom optimizer
    status: draft
    description: >
      The AI pass shall emit per-instruction and per-function abstract
      invariants in a stable schema consumable by loom. Loom shall use
      these invariants to strengthen the preconditions of its
      transformations (e.g. constant folding can be triggered when the
      AI proves a value lives in a singleton interval; bounds-check
      elision when a load offset is proven in-range). The schema shall
      be versioned and signed (see REQ-005).
    tags: [pipeline-integration, loom]
    fields:
      priority: must
      category: interface
    links:
      - type: traces-to
        target: REQ-005

  - id: REQ-005
    type: requirement
    title: AI results shall be attestable end-to-end (sigil) and traceable in rivet
    status: draft
    description: >
      Every AI run shall produce a signed attestation (sigil DSSE/in-toto
      predicate) recording: input module hash, configured domain set,
      version of the analyzer, version of the lattice library, set of
      proven invariants, and any flagged unsound-construct fallbacks.
      The attestation shall be linkable from rivet artifacts so that a
      requirement of the form "memory access X is in-bounds" can be
      `verified-by` a specific AI run.
    tags: [attestation, sigil, rivet]
    fields:
      priority: must
      category: non-functional

  - id: REQ-006
    type: requirement
    title: The AI pass shall be reusable independently of the Wasm front-end
    status: draft
    description: >
      The lattice library (intervals, octagons, region-based memory,
      reachability, taint, capability-flow, resource-lifetime) shall be
      packaged as a separate crate from the Wasm-specific frontend so
      that it can be reused by adjacent PulseEngine tools (witness for
      coverage-gap prediction; synth for invariant generation during
      ARM/RISC-V codegen). This mirrors the Brandl et al. ECOOP 2023
      pattern (AC-006) of language-independent abstract components.
    tags: [architecture, reusability]
    fields:
      priority: should
      category: non-functional
    links:
      - type: references-paper
        target: AC-006

  - id: REQ-007
    type: requirement
    title: The AI pass shall scale to fused multi-component Wasm modules
    status: draft
    description: >
      Meld produces fused multi-component Wasm modules that can grow
      considerably larger than any single component. The AI pass shall
      use compositional summary-based interprocedural analysis (per
      AC-010) so analysis time scales sub-linearly in fused module size,
      reusing summaries across components when their interfaces match.
    tags: [scalability, compositional]
    fields:
      priority: must
      category: non-functional
    links:
      - type: references-paper
        target: AC-010

  - id: REQ-008
    type: requirement
    title: The AI pass shall produce sound call graphs in the presence of call_indirect
    status: draft
    description: >
      Call-graph soundness in Wasm is empirically broken across existing
      tools (MF-003). The PulseEngine AI pass shall produce a sound call
      graph by computing call-site target sets under a value-domain
      abstract interpretation of the operand stack — the technique
      established by Paccamiccio et al. 2024 (AC-008). The resulting
      call graph shall be the substrate for all subsequent
      interprocedural analyses.
    tags: [call-graph, soundness]
    fields:
      priority: must
      category: functional
    links:
      - type: references-paper
        target: AC-008
      - type: addresses-finding
        target: MF-003

  # ──────────────────────────────────────────────────────────────────────
  # Features — user-visible capabilities the AI pass delivers.
  # ──────────────────────────────────────────────────────────────────────

  - id: FEAT-001
    type: feature
    title: Sound abstract-interpretation pass for the Wasm Core Model (v0.1 — Wasm component dogfood)
    status: implemented
    description: >
      The scry analyzer, shipping as a wasm32-wasip2 Component Model
      component (per DD-008). Exports the `analyzer.analyze` function
      defined in `wit/scry.wit` (derived from the AADL model in
      `spar/scry.aadl`, per DD-010). v0.1 shipped the Bazel + WIT +
      cross-component dogfood scaffold; v0.2 (AC#1) lands the real
      interval-domain abstract-interpretation fixpoint: the analyzer
      parses the input module with `wasmparser`, walks straight-line
      arithmetic in each function body (`i32.const`, `i64.const`,
      `local.get`, `local.set`, `local.tee`, `i32.add`, `i32.sub`,
      `i32.mul`, `end`, `return`), maintains an abstract operand
      stack, calls every interval transfer function through the
      imported `pulseengine:wasm-lattice/domain` interface, and emits
      a per-program-point invariant snapshot of locals along with a
      SHA-256 of the module bytes. Anything outside that supported
      set (control flow, memory ops, calls) emits an
      `UnsoundnessFallback` diagnostic and widens locals to top to
      preserve soundness — region-memory (FEAT-005), sound call-graph
      (FEAT-006), and summary-based interprocedural AI (FEAT-007)
      land in later versions; loom integration (FEAT-008) consumes
      the resulting invariant bundle. Built with Bazel +
      rules_wasm_component (per DD-009).

      v0.3 (FEAT-001 AC#3) lands the host wasmtime harness in
      `crates/scry-host-tests` — a native cargo crate that loads the
      composed `bazel-bin/scry.wasm` in a wasmtime embedding, runs
      each fixture under both the abstract analyzer and a concrete
      core-module wasmtime instance, and mechanically asserts that
      every concrete value lies in the matching abstract interval.
      That harness is the falsifier the v0.2.0 CHANGELOG kill-
      criterion promised but only hand-checked.
    tags: [core, pipeline, v0.1, v0.2, v0.3, component-model]
    fields:
      phase: phase-1
      acceptance-criteria:
        - "Given a small Wasm Core Model module (arithmetic only, no memory, no calls), When the scry Wasm component's `analyzer.analyze` function is invoked, Then it terminates and returns an `analysis-result` containing per-program-point interval invariants for all i32/i64 locals."
        - "Given the scry workspace, When `bazel build //:scry` runs, Then a valid wasm32-wasip2 Component Model artifact is produced at `bazel-bin/scry.wasm` and `wasm-tools validate` accepts it."
        - "Given the scry Wasm component, When invoked via a wasmtime host harness (crates/scry-host-tests) with a small concrete input module, Then the output `invariant-bundle.points` is non-empty and every interval in it over-approximates the concrete execution (verified by running the input concretely and confirming each visited value is contained in the matching abstract interval)."
        - "Given the AADL model in `spar/scry.aadl`, When `spar parse spar/scry.aadl` runs, Then the model validates with no errors."
        - "Given the per-component WIT files at `crates/wasm-lattice/wit/wasm-lattice.wit` and `crates/scry-analyzer/wit/scry.wit`, When the Bazel `wit_library` targets build, Then the cross-package import of `pulseengine:wasm-lattice/domain` from `pulseengine:scry` resolves successfully."
        - "Given the composed scry component, When inspected with `wasm-tools print bazel-bin/scry.wasm`, Then it shows the expected wasi:io / wasi:cli imports plus a `main` export wrapping the analyzer interface."
    links:
      - type: satisfies
        target: REQ-001
      - type: traces-to
        target: DD-008
      - type: traces-to
        target: DD-009
      - type: traces-to
        target: DD-010
      - type: traces-to
        target: FEAT-005
      - type: traces-to
        target: FEAT-006
      - type: traces-to
        target: FEAT-007
      - type: traces-to
        target: FEAT-008

  - id: FEAT-002
    type: feature
    title: Component-Model AI extension — handles, capability flow, host effects
    status: implemented
    description: >
      A second-phase extension lifting the AI to the Wasm Component
      Model. Per DD-002, the analysis runs on the original component
      sources upstream of meld; meld emits a minimal
      `component-provenance` custom section mapping fused-module
      function indices back to their originating component+function;
      scry projects the resulting invariants onto the fused module so
      they are consumable by loom, witness, and sigil/rivet evidence.
      Tracks resource handles as a linear/affine lattice (fresh /
      borrowed / owned / dropped), capability flow through composition
      graphs, and host-call effect sets per component function.

      v0.7 narrow scope (this draft — the "provenance-first" slice):
      ship the typed meld<->scry boundary and the projection primitive,
      not yet the handle-state analysis. The deliverable is the
      `component-provenance` custom section format (`SCPV` v1, defined
      in the pure `crates/scry-provenance` crate: magic + version +
      function-origin entries, with a strict decoder that rejects bad
      magic / unknown version / truncation / trailing garbage), the
      analyzer pre-pass that decodes the section, and the projection
      step that attaches every analyzed fused-function index to its
      component origin (`scry_provenance::project`), surfaced as
      per-function diagnostics and on the new optional
      `analysis-result.provenance` field (additive in the v1 invariant
      contract). The format and projection are falsified natively
      (`crates/scry-provenance` unit tests +
      `crates/scry-host-tests/tests/provenance.rs`, which also
      round-trips the payload through a real Wasm custom section).
      Specified in `docs/component-provenance-v1.md`
      (DOC-COMPONENT-PROVENANCE-V1). Deferred to a later FEAT-002
      slice: the handle-state lattice + use-after-drop detection
      (AC#1), host-call may-reach effect sets (AC#3), WIT refinement
      predicate discharge (AC#4), and the meld-side section emitter
      (the producer half of AC#5, tracked as a cross-repo concern
      mirroring FEAT-008 / meld#192).
    tags: [component-model, capability, v0.7]
    fields:
      phase: phase-2
      acceptance-criteria:
        - "Given a composed component graph using owned/borrowed handles, When scry runs its component-mode analysis on the original component sources, Then every use-after-drop on owned handles is reported with a witnessing abstract counterexample. (Deferred to a later FEAT-002 slice — the handle-state lattice.)"
        - "Given a fused module emitted by meld with the `component-provenance` custom section present, When scry runs its post-meld projection step, Then every Component-Model invariant from the pre-meld analysis is associated with a concrete location in the fused Core Wasm module. (v0.7: the analyzer decodes the section and projects every analyzed fused-function index to its component origin via `scry_provenance::project`, emitting it as diagnostics + on `analysis-result.provenance`.)"
        - "Given a composition graph and a WASI import set, When scry runs, Then for each component the analyzer reports the may-reach set of host imports. (Deferred to a later FEAT-002 slice.)"
        - "Given a WIT interface annotated with refinement predicates, When scry runs, Then the analyzer either discharges the predicate or reports a sound counterexample. (Deferred to a later FEAT-002 slice.)"
        - "Given meld with the `component-provenance` custom section emitter, When meld is given a composition and the section is decoded, Then the section round-trips losslessly and contains one entry per fused-module function. (v0.7 ships the scry half: the `SCPV` v1 format + strict decoder + lossless `decode(encode(x)) == x` round-trip, falsified in `crates/scry-provenance` and `crates/scry-host-tests/tests/provenance.rs`. The meld-side emitter is the deferred cross-repo producer half.)"
    links:
      - type: satisfies
        target: REQ-003
      - type: traces-to
        target: DD-002
      - type: depends-on
        target: FEAT-001
      # The provenance slice follows the same "producer publishes the
      # contract; consumer is a cross-repo concern" pattern FEAT-008
      # established (named in the description); typed link records it.
      - type: traces-to
        target: FEAT-008

  - id: FEAT-003
    type: feature
    title: Reusable wasm-lattice crate
    status: implemented
    description: >
      A standalone Rust crate providing the abstract domain library
      (interval, octagon, region-memory, reachability, taint, capability,
      resource-lifetime), domain combinators (product, reduced product),
      and widening operators — independent of the Wasm front-end and
      reusable by witness, synth, and third-party tools.
    tags: [library, reusability]
    fields:
      phase: phase-1
      acceptance-criteria:
        - "Given the wasm-lattice crate as a dependency, When a downstream tool implements transfer functions for its own IR, Then the lattice, joins, widenings, and fixpoint engine are all reusable without modification."
        - "Given each shipped abstract domain, When the test suite runs, Then a soundness lemma (paper-only acceptable for v0) is stated in rustdoc and a corresponding property-based test executes."
    links:
      - type: satisfies
        target: REQ-006

  - id: FEAT-004
    type: feature
    title: Signed AI attestation produced and consumed in the rivet chain
    status: draft
    description: >
      Each AI run produces a sigil/in-toto attestation recording inputs,
      configuration, and proven invariants. Rivet schemas allow linking
      a requirement to the attestation as `verified-by` evidence,
      closing the loop from "module is bounds-safe" requirement to a
      mechanically reproducible AI run.
    tags: [attestation, integration, v0.6]
    fields:
      phase: phase-1
      acceptance-criteria:
        - "Given an AI run, When the run completes successfully, Then a sigil-signed in-toto attestation is emitted containing input hash, domain set, analyzer version, and the invariant set."
        - "Given a requirement marked verified-by an AI attestation, When rivet validate runs, Then the attestation existence and signature are verified before the requirement can transition to 'verified' status."
    links:
      - type: satisfies
        target: REQ-005

