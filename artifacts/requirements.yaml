        target: REQ-002
      - type: traces-to
        target: DD-003
      - type: traces-to
        target: FEAT-010
      - type: evaluates-tech
        target: TE-006
      - type: evaluates-tech
        target: TE-007

  - id: FEAT-005
    type: feature
    title: "v0.3 — Region-based linear-memory model (CRAB-style)"
    status: implemented
    description: >
      Add a region-based memory abstraction to the wasm-lattice
      component and use it from scry-analyzer. Wasm linear memory is
      modelled as a set of regions, each a `(region-id, offset-
      interval)` pair; the lattice operations (`region-create`,
      `region-offset`, `region-leq`, `region-join`, `region-meet`,
      `region-widen`) are exported from the
      `pulseengine:wasm-lattice/domain` interface and dogfooded
      across the WIT boundary per DD-008. Joins do not collapse
      unrelated regions into a single interval, preserving
      precision for bounds-check invariants.

      v0.3 narrow scope (this draft): the analyzer recognises the
      canonical "base + constant offset" pointer pattern Wasm
      compilers emit for stack-allocated locals (i.e. an
      `i32.load` / `i32.store` whose address operand is a
      singleton i32 interval), synthesises a region pointer via
      the new lattice ops, proves the access is in-bounds against
      the parsed memory section's declared page count, and emits
      a precise diagnostic (`Info` for proven-safe, `Warning` for
      cannot-prove) instead of v0.2's blanket
      `UnsoundnessFallback`. The loaded value itself is still
      `top` for v0.3 — precise per-region content tracking lands
      in v0.4+ alongside FEAT-007's summary-based
      interprocedural analysis. Per-stack-frame region splitting
      and proptest soundness sweeps land in the same v0.4+ band
      (see acceptance-criteria item 4 below).
    tags: [domains, memory, v0.3]
    fields:
      phase: phase-1
      acceptance-criteria:
        - "Given `crates/scry-analyzer/test-fixtures/fixture-03-region-bounds.wat` (a `(memory 1)` module with `i32.const 100; i32.const 4; i32.add; i32.load`), When scry analyzes it, Then `i32.load` at pc=3 emits a single `Info` diagnostic of the form `i32.load bounds-check elision safe at pc=3: access [104, 108) fits in default region of 65536 bytes` and no `UnsoundnessFallback` diagnostic for the load."
        - "Given a Wasm module whose `i32.load` address interval cannot be proven inside the declared memory pages (e.g. an address `>= 65536` in a one-page module), When scry analyzes it, Then a `Warning` diagnostic is emitted naming the address interval, the load width, and the declared region size — but locals are NOT scrubbed to top (precision preserved for the rest of the function)."
        - "Given the wasm-lattice WIT package at `crates/wasm-lattice/wit/wasm-lattice.wit`, When the Bazel `wit_library` target builds, Then the new `region` record plus `region-create` / `region-offset` / `region-leq` / `region-join` / `region-meet` / `region-widen` ops resolve and the cross-component import from `crates/scry-analyzer/wit/scry.wit` (`use pulseengine:wasm-lattice/domain@0.1.0.{interval, region}`) succeeds."
        - "Given the v0.4+ FEAT-007 milestone, When summary-based interprocedural AI lands, Then the v0.3 region scaffold extends to per-stack-frame regions and a richer per-region content domain without a wasm-lattice WIT break — i.e. v0.3 is the structural foundation for v0.4+ memory precision."
        - "Given the region domain, When proptest generates random concrete memory traces (deferred to v0.4+ alongside the richer content model), Then the concrete final state is ⊑-included in the abstract result for every trace."
    links:
      - type: satisfies
        target: REQ-001
      - type: references-paper
        target: AC-006
      - type: evaluates-tech
        target: TE-005
      - type: depends-on
        target: FEAT-001
      - type: traces-to
        target: DD-008
      - type: traces-to
        target: FEAT-007

  - id: FEAT-006
    type: feature
    title: "v0.4 — Sound call_indirect resolution (value-domain call graph)"
    status: implemented
    description: >
      Implement the Paccamiccio et al. 2024 technique (AC-008): track
      the operand stack with the interval domain (collapsing to a
      singleton constant where the index is known) so that
      call_indirect target sets are resolved soundly. The analyzer
      parses the table + active element segments in its pre-pass to
      build the function table (index → function reference); on a
      `call_indirect` it pops the top-of-stack index interval,
      intersects it with the table bounds `[0, table-len)`, and
      resolves the target set to every table entry in range — a
      constant index resolves PRECISELY to a single target, an
      unconstrained index over-approximates soundly to the whole
      table (a `Warning`, never the unsound under-approximation that
      plagues other Wasm analyzers per MF-003). A new `call-graph`
      field on `analysis-result` carries the resolved
      `(caller, pc, resolved-targets, soundness-tag)` edges; direct
      `call`s are recorded as trivially-sound single-target edges.

      v0.4 narrow scope (this draft): resolve the call *graph*, not
      call *effects* — the analyzer does NOT descend into callees
      (no interprocedural fixpoint; that is FEAT-007). After a call
      the operand-stack effect is modelled pessimistically (pop the
      callee's params, push `top` per result, per the callee's type
      signature), which is sound. Element-segment parsing handles
      the common case (a single funcref table populated by active
      segments with constant i32 offsets); passive/declared segments,
      non-constant offsets, expression-valued items, and growable
      tables fall back to a whole-table over-approximation (sound,
      imprecise). The reachability / dead-code powerset domain
      originally bundled here is deferred to a later draft — FEAT-006
      ships the sound call graph that is the substrate for the
      summary-based interprocedural analysis in FEAT-007.
    tags: [call-graph, soundness, v0.4]
    fields:
      phase: phase-1
      acceptance-criteria:
        - "Given `crates/scry-analyzer/test-fixtures/fixture-04-call-indirect.wat` (a `(table 3 3 funcref)` module with an active element segment `[0,1,2]` and a `call_indirect` on the constant index 1), When scry analyzes it, Then the `analysis-result.call-graph` contains an edge `(caller=3, pc=1, indirect=true, resolved-targets=[1], soundness=sound)` and the `call_indirect` at pc=1 emits a single `Info` diagnostic naming 1 resolved target and no `UnsoundnessFallback`."
        - "Given the same fixture's `dispatch_unknown` entry (a `call_indirect` whose index is the function's i32 parameter, abstract value top), When scry analyzes it, Then the call-graph edge resolves to the whole table `resolved-targets=[0,1,2]` tagged `sound`, a `Warning` diagnostic of the form `call_indirect index unconstrained — 3 targets` is emitted, and locals are NOT scrubbed to top."
        - "Given any Wasm module reaching a `call_indirect` with a concrete index k, When scry runs, Then the resolved target set contains `table[k]` for every concrete k (soundness by reduction to the interval domain's soundness, FEAT-001 AC#1) — scry never under-approximates."
        - "Given a differential corpus of Wasm modules, When scry's call graph is compared to Wassail's (deferred to the v0.5+ corpus milestone), Then scry never under-approximates and reports the precision delta."
    links:
      - type: satisfies
        target: REQ-008
      - type: references-paper
        target: AC-008
      - type: addresses-finding
        target: MF-003
      - type: depends-on
        target: FEAT-001
      - type: traces-to
        target: FEAT-007

  - id: FEAT-007
    type: feature
    title: "v0.5 — Compositional summary-based interprocedural AI"
    status: implemented
    description: >
      Implement per-function abstract summaries in the Stiévenart-De
      Roover 2020 style (AC-010): each function gets a summary
      describing the abstract effect of its parameters on its outputs.
      Summaries are computed bottom-up over the (sound) call graph from
      FEAT-006, in reverse-topological order of the call-graph SCC
      condensation (callees before callers, Tarjan), and reused at
      every call site so a `call` / `call_indirect` no longer pushes
      `top` per result. Recursive components (functions in a
      non-trivial SCC, self- or mutually-recursive) are handled with
      widening at the recursion frontier: they get the sound
      context-insensitive `top`-summary and are never re-evaluated
      context-sensitively — guaranteeing termination (REQ-001).

      v0.5 narrow scope (this draft): the analysis becomes two-phase.
      Phase 1 computes each function's context-INSENSITIVE summary by
      running the intraprocedural fixpoint (FEAT-001 AC#1) with
      parameters bound to `top`. Phase 2 is the existing per-function
      walk, but at each call site it applies the callee's summary
      instead of pushing `top`; for a small (≤ 64 ops), non-recursive
      direct callee whose argument intervals are concrete it
      additionally performs a context-SENSITIVE re-evaluation — re-run
      the callee's fixpoint with the actual argument intervals bound to
      its params, bounded by a call-depth backstop (≤ 8) — and uses
      that strictly-more-precise result. The headline win:
      `main() = add_one(41)` where `add_one(x) = x + 1` now infers
      `{42, 42}` where v0.4 yielded `top`. A `call_indirect` to a
      precisely-resolved target set applies the JOIN of the targets'
      context-insensitive summaries (sound). A new `function-summaries`
      field on `analysis-result` carries the per-function
      `(func-index, param-count, result-summary, context-sensitive,
      recursive)` records. Deferred to a later draft: full polyvariant
      context-sensitivity, cross-component summaries, context-sensitive
      re-eval through `call_indirect` / into recursive or oversized
      callees, and the >=50k-instruction sub-linear-scaling and
      >=60%-precise-summary benchmark targets (which need the corpus
      milestone).
    tags: [interprocedural, scalability, v0.5]
    fields:
      phase: phase-1
      acceptance-criteria:
        - "Given `crates/scry-analyzer/test-fixtures/fixture-05-interproc.wat` (a module with `add_one(x) = x + 1` and `main() = add_one(41)`), When scry analyzes it, Then at the `call $add_one` site in `main` the operand-stack result is the precise interval `{42, 42}` (context-sensitive re-evaluation of the small non-recursive callee), where v0.4 pushed `top` — the interprocedural precision win."
        - "Given the same fixture's self-recursive `factorial`, When scry analyzes it, Then `factorial` is flagged `recursive` in `analysis-result.function-summaries`, uses the sound context-insensitive `top`-summary (result-summary = `top`), is NEVER re-evaluated context-sensitively, and the analysis terminates (bounded by the SCC `recursive` flag plus the ≤ 8 call-depth and ≤ 64 op-count backstops)."
        - "Given any Wasm module and any function `f`, When scry computes `summary_f`, Then `summary_f(args)` over-approximates `{ f(concrete) : concrete ∈ γ(args) }` — it is the result of the (sound, FEAT-001 AC#1) intraprocedural fixpoint run with params bound to `args`, with widening at recursion frontiers guaranteeing a sound post-fixpoint; applying `summary_f` at a call site is sound because the call-site arguments soundly abstract the concrete arguments."
        - "Given a fused module of size >= 50k instructions, When scry runs with summary-based interprocedural analysis, Then analysis completes in time sub-linear in fused module size. (Deferred to the v0.5+ corpus milestone.)"
        - "Given a benchmark suite of real PulseEngine fused modules, When summary precision is measured, Then >= 60% of summaries are computed precisely (Stiévenart 2020 reference number). (Deferred to the v0.5+ corpus milestone.)"
    links:
      - type: satisfies
        target: REQ-007
      - type: satisfies
        target: REQ-001
      - type: references-paper
        target: AC-010
      - type: depends-on
        target: FEAT-006
      - type: depends-on
        target: FEAT-001

  - id: FEAT-008
    type: feature
    title: "v0.6 — loom contract: published invariant JSON schema (v1)"
    status: implemented
    description: >
      Publish a stable, versioned JSON schema (v1) for scry's per-
      instruction and per-function abstract invariants so the loom
      optimizer can validate scry output without coupling to scry's
      WIT bindings. The v0.6 deliverable is the contract itself:
      contracts/scry-invariants-v1.schema.json (JSON Schema draft
      2020-12, $id https://pulseengine.eu/scry-invariants/v1),
      documented field-by-field against the WIT analysis-result in
      docs/invariant-schema-v1.md (DOC-INVARIANT-SCHEMA-V1). The
      schema is the serialized form of the existing invariant-bundle
      / call-graph / function-summaries types (no new WIT types). It
      maps each invariant kind to a sound loom transform: a singleton
      interval (lo == hi) enables constant folding; a region-pointer
      whose offset is proven within the region size enables bounds-
      check elision; a singleton, sound call-edge target set enables
      devirtualization of call_indirect to a direct call. Loom-side
      consumption of the contract is tracked as a separate cross-repo
      issue (mirrors FEAT-002 / meld#192). Honest constraint: the
      contract is validated against a HAND-CONSTRUCTED analysis-result
      -shaped value, not a live analyze() run, because
      rules_wasm_component's wac_compose emits root-level component
      imports that wasmtime 45 rejects (the abstract-side host harness
      is skipped — see crates/scry-host-tests/tests/soundness.rs).
    tags: [integration, loom, contract, v0.5, v0.6]
    fields:
      phase: phase-1
      acceptance-criteria:
        - "Given contracts/scry-invariants-v1.schema.json, When it is loaded as a JSON Schema, Then it is a valid draft 2020-12 schema declaring $id https://pulseengine.eu/scry-invariants/v1 and faithfully describes the WIT analysis-result (invariant-bundle, call-graph of call-edge, function-summaries of function-summary, abstract-value as a kind-tagged oneOf)."
        - "Given a representative analysis-result-shaped value built with plain serde structs (independent of the WIT bindings), When the native contract test crates/scry-host-tests/tests/contract.rs serializes it via serde_json and validates it with the jsonschema crate, Then it validates against the v1 schema and the schema rejects malformed instances (bad kind, missing variant payload, additionalProperties, wrong schema URI, bad module-sha256, invalid soundness enum, missing required field)."
        - "Given the v1 contract, When an invariant kind is read, Then the contract expresses each of the three loom transforms: a singleton interval (lo == hi) for constant folding (FEAT-001); a region-pointer with a bounded offset for bounds-check elision (FEAT-005); a singleton sound call-edge target set for devirtualizing call_indirect to call (FEAT-006)."
        - "Given a meld→scry→loom pipeline run, When loom reports its applied transformations, Then loom names the scry invariants that enabled each invariant-dependent transformation. (Loom-side; deferred to the cross-repo loom-consumption issue.)"
        - "Given the invariant schema, When loom is given a malformed or version-mismatched invariant file, Then loom refuses to apply invariant-dependent transformations and produces a clear error. (Loom-side; deferred to the cross-repo loom-consumption issue.)"
