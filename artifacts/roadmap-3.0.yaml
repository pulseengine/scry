  # ══════════════════════════════════════════════════════════════════════
  # RELEASE v3.3.0 — "Precision ceiling" (the second big domain bet)
  # Convex polyhedra above the octagon. Sequenced AFTER v3.2 segmentation.
  # ══════════════════════════════════════════════════════════════════════

  - id: FEAT-057
    type: feature
    title: "v3.3 — Convex polyhedra domain (ELINA-decomposed)"
    status: proposed
    release: v3.3.0
    description: >
      Convex polyhedra (Cousot-Halbwachs 1978, AC-012; DD-019) for exact linear
      inequalities Σ a_i·x_i ≤ c above the octagon, made tractable by ELINA-style
      online constraint decomposition into independent variable blocks (TE-012).
      Sequenced AFTER v3.2 segmentation. Slices:
        1. SHIPPED (#104, published 3.2.1): pure crate `scry-sai-poly` —
           constraint-form polyhedra with meet = constraint union (exact),
           Fourier-Motzkin entailment, a sound entailed-by-both join
           (over-approximation of the hull; the exact double-description hull +
           ELINA decomposition are deferred), and widening. Native γ-sweep;
           admit-free Rocq LATTICE proof (proofs/rocq/Poly.v). Clean-room SOUND.
        2. REFRAMED — wire into the analyzer. **Discovery (2026-07-14):** the
           intended additive STRAIGHT-LINE pass (mirroring the bits/float passes)
           is near-VACUOUS for polyhedra, and for a SOUND reason. Polyhedra's
           value is general-coefficient facts (`z = x + y`), but over Wasm's
           WRAPPING i32 that equality is unsound unless no-wrap is proven — which
           needs value BOUNDS, which come from GUARDS, which need the FIXPOINT.
           On straight-line code with unbounded params, every arithmetic result
           may wrap ⇒ no octagon-beating fact is soundly emittable. (Unlike
           bits/float, which are wrap-internal.) So the poly BODY requires the
           full fixpoint integration: a `Poly` on FuncCtx threaded in LOCKSTEP
           with the octagon (join/widen at every merge), wrap-AWARE assignment
           transfers gated on the interval domain's no-wrap result (scry_interval
           i32_add returns ⊤ exactly when wrap is possible), guard refinement,
           and `Poly::project` (FM variable elimination) for reassignments. This
           is a multi-slice arc like the octagon's v1.7–1.9 — tracked as its own
           sub-arc, not crammed. Surface via the FEAT-041 relational output.
        3. Precision + cost differential vs the octagon on a corpus.
      HONESTY (carried from the WasmCert-Coq pass): full convex-hull / Fourier-
      Motzkin soundness is NOT cheaply mechanizable — Poly.v mechanizes the
      lattice algebra only; the transfer functions are γ-sweep-validated and the
      dossier records them AS SUCH (not as mechanized), exactly as the float
      rounding transfers are. No overclaim of "mechanized" for the hull.
    tags: [numerical-domain, polyhedra, relational, precision-ceiling, v3.3]
    fields:
      phase: phase-3
      acceptance-criteria:
        - "Given a program with linear inequality invariants the octagon cannot express, When scry analyzes it, Then the polyhedra domain infers them soundly (decomposed) and surfaces them via the relational-invariant output."
        - "Given proofs/rocq/Poly.v, When built, Then the polyhedra LATTICE laws (order/join-upper-bound/meet-glb) are proven with 0 admits; the transfer functions are documented as γ-sweep-validated, NOT mechanized (honest scope)."
        - "Given the precision corpus, When polyhedra is compared to the octagon, Then it is strictly more precise on the targeted inequality cases within a bounded cost budget."
    links:
      - type: traces-to
        target: REQ-016

      - type: references-paper
        target: AC-012
      - type: evaluates-tech
        target: TE-012
  # ══════════════════════════════════════════════════════════════════════
  # RELEASE v3.2.0 — "Content-sensitive memory" (the first big domain bet)
  # Segmentation first: it attacks scry's biggest current ⊤-cliff and
  # compounds interval / OOB-trap / region precision. Polyhedra (v3.3) after.
  # ══════════════════════════════════════════════════════════════════════

  - id: FEAT-058
    type: feature
    title: "v3.2 — Linear-memory segmentation (content-sensitive memory)"
    status: accepted
    release: v3.2.0
    description: >
      Give scry's flat linear-memory region per-segment content sensitivity via
      a parametric segmentation functor (Cousot-Cousot-Logozzo, AC-015; DD-018):
      a memory region becomes an ordered sequence of segments with symbolic
      bounds (from the interval/octagon domain) and a plugged-in content domain
      (intervals first). Closes REQ-019 and lifts the biggest current ⊤-cliff.
      Slices as shipped (v3.2.0):
        1. New pure crate `scry-sai-segment` — the segmentation functor over
           intervals: top / leq / join / widen / strong+weak store / load, with
           admit-free Rocq soundness (proofs/rocq/Segment.v) for the core ops
           and a native γ-sweep falsifier. (#99)
        2. Wired into the interpreter's memory model: `i32.store` to a SINGLETON
           in-bounds address records the stored interval; `i32.load` at a
           singleton in-bounds address returns it (the round-trip that lifts the
           ⊤ cliff). Carried through the CFG fixpoint in lockstep with the
           octagon. (#100)
      Soundness discipline (as shipped): content is recorded ONLY for a singleton
      in-bounds i32 (4-byte) store of a plain i32 value; every store first
      INVALIDATES the overlapping byte window `[a−7, a+w)` to ⊤ (the type-punning
      keystone — no stale/mis-punned cell survives an overlapping write); any
      call, degrade, havoc, or non-singleton/other-width/unknown address forgets
      or ⊤s content. Library-only output (loads return tighter intervals into the
      existing result); WIT surfacing deferred to FEAT-054.
      DEFERRED (not v3.2.0): recording content for a loop-range (non-singleton)
      fill — needs stride/alignment info to be sound (FEAT-037), tracked as
      FEAT-061; and feeding segment facts into OOB-trap/gap reduction beyond the
      precision that already falls out of tighter loaded values.
    tags: [memory, array, segmentation, content-sensitivity, v3.2]
    fields:
      phase: phase-3
      acceptance-criteria:
        - "Given an i32.store of a bounded value to a SINGLETON in-bounds address followed by an i32.load at that address, When scry analyzes it, Then the loaded value is the tracked interval (e.g. [42,42]) instead of ⊤. (Shipped v3.2.0: feat058_store_then_load_round_trips.)"
        - "Given a store whose bytes may overlap a tracked cell (a wider store, a non-singleton/unknown address, or an intervening call), When scry updates memory, Then every possibly-overlapping cell is INVALIDATED to ⊤ — a stale or mis-punned value is never read (the soundness keystone). (Shipped v3.2.0: feat058_overlapping_wider_store_invalidates, feat058_call_forgets_memory.)"
        - "Given proofs/rocq/Segment.v, When built, Then the segmentation core ops (join/leq/strong+weak store/load) are γ-sound with 0 admits / 0 axioms. (Shipped v3.2.0: //proofs/rocq:segment_test.)"
        - "DEFERRED (not v3.2.0, tracked FEAT-061): a loop that fills a memory RANGE with a bounded value tracks the per-segment content bound — requires stride/alignment integration (FEAT-037) to record range content soundly."
    links:
      - type: traces-to
        target: REQ-019
      - type: traces-to
        target: REQ-001
      - type: references-paper
        target: AC-015

  # ── FEAT-058 follow-up (deferred from v3.2.0) ─────────────────────────

  - id: FEAT-061
    type: feature
    title: "Backlog — Alignment-aware range-fill memory content (FEAT-058 follow-up)"
    status: proposed
    description: >
      Record segmentation CONTENT for a loop-range (non-singleton address) fill
      rather than only invalidating it — closing FEAT-058's deferred AC. Sound
      range-fill needs stride/alignment: writing a value V to every byte offset in
      the range is unsound (a mis-aligned load could read V where the real value
      spans two slots), so the store must know the access is width-aligned to
      record V only at genuine value bases. scry already computes alignment/stride
      via the known-bits × congruence domain (FEAT-037); this feeds that into the
      segmentation weak store so an array-fill loop tracks its per-segment content
      bound instead of ⊤.
    tags: [memory, segmentation, alignment, content-sensitivity, backlog]
    fields:
      phase: future
      acceptance-criteria:
        - "Given a loop that fills an i32 array with a bounded value at a width-aligned stride, When scry analyzes it, Then a load from the filled range returns the per-segment content bound instead of ⊤ — soundly, using the FEAT-037 alignment facts."
    links:
      - type: traces-to
        target: REQ-019
      - type: references-paper
        target: AC-015

