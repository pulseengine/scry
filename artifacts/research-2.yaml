  - id: MF-006
    type: market-finding
    title: "Runtime-error / trap detection is the defining capability of the sound-analyzer bar — scry has the domains but emits no verdicts"
    status: draft
    tags: [runtime-error, positioning, gap]
    description: >
      Every sound competitor (Astrée, Polyspace Code Prover, Frama-C/Eva,
      TrustInSoft, VeriWasm) is fundamentally a "prove absence of run-time
      errors" tool. scry's interval/region/pentagon-able domains already compute
      the facts (a divisor interval containing 0; an address interval exceeding
      the region) but scry classifies NO trap site — div/rem, OOB load/store,
      unreachable, overflow, stack-exhaustion all fall to the sound top fallback.
      Closing this (REQ-014) is the single biggest credibility gap vs the bar
      and the most visible capability for the qualification thesis (G-005).
    fields:
      domain: "Sound static analysis / safety-critical Wasm"
      finding-type: tool-gap
      source: "Competitive sweep CA-001/003/004/005/006 (2026-06)"
      confidence: high

  - id: MF-007
    type: market-finding
    title: "No sound handle-state analyzer exists for the Wasm Component Model — uncontested green field"
    status: draft
    tags: [component-model, green-field, opportunity, moat]
    description: >
      The Component Model's resource handles (own/borrow, destructor-on-last-drop)
      have no mature sound analyzer; WAW 2025 notes syntactic type soundness is
      insufficient for the interesting properties. scry already owns the meld
      component-provenance boundary (SCPV v3) — extending it to track handle
      lifetimes (use-after-drop, double-drop, leaked handles) would be a
      category-defining, uncontested capability (REQ-003 substance / CA-009).
    fields:
      domain: "WebAssembly Component Model verification"
      finding-type: opportunity
      source: "Competitive sweep CA-009 + AC-009/AC-024 (2026-06)"
      confidence: high
