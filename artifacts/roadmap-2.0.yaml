  - id: TE-009
    type: technology-evaluation
    title: "MathWorks Polyspace Code Prover — sound abstract-interpretation prover (commercial bar)"
    status: draft
    description: >
      Polyspace Code Prover uses abstract interpretation to soundly prove
      the absence of run-time errors (overflow, divide-by-zero,
      out-of-bounds access) in C/C++ without executing the code, and
