  - id: REQ-011
    type: requirement
    title: "Downstream consumers get a sound, over-approximate call-graph/reachability output (SCRY-001)"
    status: proposed
    description: >
      The analysis-result shall expose, with a stated soundness contract, the
      call structure a downstream tool needs to PROVE a program property fits a
      budget. synth's shadow-stack / linear-memory footprint (synth#383,
      VCR-MEM-001; collab issue #51) is the first consumer. This is the schema
      synth's VCR-RA-010 forward-references as "SCRY-001". The contract — the
      two facts that enter the consumer's TCB:
        (1) `call-edge.resolved-targets` for a `call_indirect` site is a SOUND
            SUPERSET of the concretely-reachable callees (type-signature +
            reachable-`elem` filtered; whole declared table when the index is
            unconstrained). A superset only ever RAISES a longest-path bound,
            never lowers it.
        (2) `function-summary.recursive` is TRUE for every function in a cycle
            of the (over-approximated, incl. indirect) reachable call graph, so
            a consumer can honest-fail on unbounded depth.
      Over-approximation is the safety posture: nothing scry asserts enters the
      consumer's correctness TCB beyond "this is an over-approximation"; the
      consumer re-derives its property and fails closed when the bound is
      unprovable. (1) and (2) are met today by FEAT-006 / FEAT-007; this
      requirement formalises the contract and adds the reachability output
      (FEAT-022).
    tags: [reality, interop, call-graph, reachability, soundness, scry-001]
    fields:
      priority: should
      category: functional
    links:
      - type: traces-to
        target: REQ-001
      - type: traces-to
        target: FEAT-006
      - type: traces-to
        target: FEAT-007
      - type: traces-to
        target: FEAT-022

  - id: REQ-012
    type: requirement
    title: "Downstream consumers get the sound abstract operand-stack at each program point"
    status: proposed
    description: >
      The analysis-result shall expose, per emitted program point, the abstract
      OPERAND-STACK (the transient value-stack) in stack order (bottom → top),
      not only the locals. A code-generation / backend consumer (synth, collab
      issue #54 item 1) maps these transient temps onto SSA values / selected
      instructions and wants the same constant / range facts scry already
      proves for locals — e.g. a known singleton on the stack top is the
      operand-stack analogue of a constant local.

      Soundness contract (what enters the consumer's TCB): each listed stack
      slot OVER-APPROXIMATES the concrete value at that slot under the interval
      domain (identical to the per-local contract). Listing FEWER slots than
      the true height is sound (a vacuous claim about the omitted top slots);
      listing a slot whose abstract value does NOT contain the concrete value
      is the only unsoundness, and is forbidden. At a point reached only via a
      not-precisely-modelled region (write-set havoc), scry emits an EMPTY
      operand-stack rather than a stale one — honest silence over a false claim.

      Library-only surface: synth consumes `scry-sai-core` as a crate and reads
      `ProgramPoint.operand_stack: Vec<AbstractValue>` directly (the WIT
      `program-point` mirror is unchanged; a later slice may surface it for
      non-Rust consumers).
    tags: [interop, invariants, operand-stack, soundness, v1.x]
    fields:
      priority: should
      category: functional
    links:
      - type: traces-to
        target: REQ-001
      - type: traces-to
        target: FEAT-023

  - id: REQ-013
    type: requirement
    title: "scry's analysis output is inspectable as a static, shareable visualization"
    status: proposed
    description: >
      A scry `AnalysisResult` shall be renderable as a self-contained static
      artifact (no server, no JavaScript, no external assets) that a human can
      open and audit — the analyzer's own analogue of the witness-viz MC/DC
      truth-table site. The artifact surfaces the analysis a reviewer/consumer
      cares about: per-function shadow-stack bound, reachability and recursion
      flags, the call graph (incl. call_indirect resolved-target sets +
      soundness tag), diagnostics, and the per-program-point invariants
      (locals AND the FEAT-023 operand-stack).

      Soundness posture (what enters NO TCB): the visualization is a FAITHFUL
      RENDERING — it re-derives nothing and asserts nothing beyond what the
      `AnalysisResult` states. Each value shown is a verbatim projection of an
      analyzer field; an empty operand-stack is rendered as an explicit
      "(empty)" (the analyzer's honest "no info here"), never as a claim that
      the concrete stack is empty. Attacker-influenced strings (diagnostic
      messages, schema URL, module name) are HTML-escaped.
    tags: [interop, visualization, tooling, evidence, v1.x]
    fields:
      priority: could
      category: functional
