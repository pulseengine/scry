  - id: DD-016
    type: design-decision
    title: "FEAT-021 staging — worst-case shadow-stack bound by call-graph longest-weighted-path, smallest-sound-first"
    status: approved
    description: >
      How scry computes a worst-case STACK-SIZE bound for a Wasm component, the
      AbsInt StackAnalyzer / WCET analogue (a resource bound that complements
      the v2.0 qualification dossier goal, G-005).

      WHAT TO BOUND: not the Wasm operand stack (statically validation-bounded,
      small) but the LINEAR-MEMORY SHADOW STACK — Rust/LLVM keep a C-style stack
      via a mutable global (the `__stack_pointer`, conventionally global 0). Each
      function's prologue subtracts a constant frame from it
      (`global.get $sp; i32.const F; i32.sub; global.set $sp`) and the epilogue
      restores it. So worst-case shadow-stack bytes = the deepest WEIGHTED PATH
      through the call graph, each node weighted by its frame contribution —
      exactly AbsInt's value-analysis → call-graph → longest-path/IPET shape.
      Secondary metric: call DEPTH (wasmtime max_wasm_stack traps).

      WHY scry is well-positioned: the backbone already exists in
      crates/scry-analyze-core — the call graph (CallEdge, direct + call_indirect
      with whole-table over-approximation), Tarjan SCCs (tarjan_sccs), a
      reverse-topological order (sccs_reverse_topo_order), and per-function
      FunctionSummary (with a `recursive` flag) computed bottom-up. A frame-size +
      max-stack summary field drops straight into that traversal. The one new
      surface is a FRAME-SIZE DETECTOR (scry does not yet model globals; it must
      recognise the SP-prologue and extract the frame as a constant, reusing the
      interval domain's i32.const / i32.sub transfer).

      SOUNDNESS GUARDRAILS (the analysis is UNSOUND if any is violated):
      (1) Each function's weight must be its MAXIMUM live shadow-stack
      contribution over the whole body, NOT merely the prologue constant — a
      mid-body dynamic alloca (variable SP subtract) or per-call push would make
      summing prologue constants UNDER-count. Unrecognised / dynamic frames →
      ⊤ (unknown), never 0.
      (2) Recursion: every SCC (incl. self-recursion) is reported UNBOUNDED. The
      SP lives in linear memory; the interval/octagon cannot bound recursion
      depth without a ranking-function/termination argument — claiming otherwise
      would be an overclaim. (A future slice may add a depth bound with a real
      ranking function.)
      (3) call_indirect / host-import / cross-component edges must be
      over-approximated or declared explicitly OUT OF SCOPE — never silently
      dropped — or the worst-case claim is false. Host/WASI frames run on a
      different stack scry cannot see: declared out of scope (the claim is
      "guest shadow-stack only").
      (4) The mechanized soundness obligation must quantify over an operational
      push/pop semantics of the shadow stack ("for all executions, actual peak
      ≤ reported bound"), not merely the longest-path graph arithmetic.

      STAGING (smallest-sound-first, as the octagon arc was):
        slice-1 — frame-size detector (SP-prologue → max-live constant, ⊤ else)
          + frame_bytes / max_stack_bytes on FunctionSummary, computed in the
          existing reverse-topo SCC pass; non-recursive direct-call longest-path;
          recursion-SCC → unbounded; call_indirect / dynamic / host → ⊤ / out of
          scope. Result on the plain-Rust AnalysisResult + a diagnostic — NO WIT
          change (so no //:scry composition risk). Rocq proof per guardrail (4).
        slice-2 — surface max-stack-bytes + per-function frames in scry.wit
          (additive) + a host-test oracle that measures the real SP-global peak
          in wasmtime and cross-asserts peak ≤ bound.
        slice-3 — precision: weight call_indirect by the resolved target set
          (vs whole-table ⊤); optionally a ranking-function recursion bound.

      Falsifiable claim (slice-1): for a non-recursive component with recognised
      prologues, the reported max-shadow-stack-bytes ≥ the true peak on every
      concrete run. Falsifier: a .wat fixture whose concrete peak (SP-global
      instrumentation) exceeds the reported bound.
    tags: [decision, capability, stack-analysis, wcsu, v2.0]
    fields:
      rationale: >
        Longest-weighted-path over the acyclic call graph is the standard sound
        model for peak stack (= max over call-stack configurations of the sum of
        simultaneously-live frames; any root-to-leaf path is a realisable live
        set). scry already builds the call graph + SCCs + bottom-up summaries, so
        the marginal cost is a frame detector + one summary field + the soundness
        discipline above — net-new risk low and isolated (additive pass, does not
        touch the interval/octagon/taint domains or the //:scry composition).
    links:
      - type: satisfies
        target: REQ-001
      - type: traces-to
        target: FEAT-021
      - type: traces-to
        target: FEAT-006
      - type: traces-to
        target: FEAT-007
      - type: traces-to
        target: G-005

