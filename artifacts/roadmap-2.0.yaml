      bar scry's credit positioning and v2.0 qualification dossier must
      meet. Like Astrée its soundness is a vendor design claim, not
      mechanically proven against a formal language semantics — the gap
      scry's Rocq-against-WasmCert-Coq proofs fill (recorded in MF-005).
