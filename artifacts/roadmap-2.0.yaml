  - id: MF-005
    type: market-finding
    title: "No commercial sound analyzer offers mechanized soundness, and none targets Wasm — scry's niche"
    status: draft
    description: >
      Deep-research (2026-05-30) over primary vendor sources establishes
      the competitive shape of sound abstract interpretation in 2025–2026:
      (1) AbsInt Astrée targets C/C++ only — no public Ada, Rust,
      Wasm, or ML roadmap — and its recent releases (25.04 / 25.10) refine
      existing domains (dynamic octagon packs, symbolic-domain and
      Boolean-pack precision) rather than adding new domain theory: a
      maturity plateau. (2) Polyspace and Frama-C EVA
      occupy the same sound-prover category; Infer/Pulse is deliberately
      UNSOUND (incorrectness logic) and is a methodological contrast, not
      a competitor. (3) Crucially, every commercial sound analyzer's
      soundness is a vendor *design claim* backed by audit and
      qualification kits (QSK/QSLCD), NOT a machine-checked theorem
      against a formal language semantics. (4) TrustInSoft adding Rust in
      2025-11 shows sound AI is expanding to memory-safe /
      emerging-target languages. scry's defensible niche is the
      intersection no incumbent occupies: a sound analyzer for Wasm whose
      soundness is *mechanically proven* in Rocq against WasmCert-Coq
      (REQ-002) — soundness as a theorem, not a brochure. This is the
      thesis the 2.0 capability track and the qualification dossier
      (FEAT-020) are built to defend.
    tags: [competitive, sound-ai, mechanized-soundness, wasm, niche]
    fields:
      domain: aerospace
      finding-type: opportunity
      source: "deep-research 2026-05-30 over absint.com, mathworks.com, frama-c.com, trust-in-soft.com primary sources"
      confidence: high
