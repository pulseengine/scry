  - id: FEAT-021
    type: feature
    title: "v1.10 — Worst-case shadow-stack bound (WCSU): AbsInt StackAnalyzer analogue for Wasm"
    status: proposed
    description: >
      Compute a sound worst-case STACK-SIZE bound for a Wasm component — the
      resource-bound analysis AbsInt StackAnalyzer (the aiT family) and
      Polyspace provide for native code, here for the Wasm linear-memory
      SHADOW STACK. Each function's frame is the constant its prologue subtracts
      from the `__stack_pointer` global; the worst-case usage is the deepest
      weighted path through the call graph. scry already has the backbone — the
      call graph (FEAT-006), Tarjan SCCs + reverse-topo order, and bottom-up
      FunctionSummary (FEAT-007) — so this adds a frame-size detector + a
      max-stack summary field computed in that existing traversal. Staged
      smallest-sound-first per DD-016, with explicit soundness guardrails
      (max-live weight not prologue-only; recursion-SCC → unbounded;
      call_indirect / host / dynamic frames → ⊤ / out of scope; the bound
      over-approximates the true peak under an operational push/pop semantics).
      A concrete resource bound strengthens the v2.0 qualification dossier
      (G-005) with the WCSU evidence assessors expect alongside WCET.

      EVIDENCE (v1.10.0 — slice-1 per DD-016, feature STILL proposed): landed in
      scry-analyze-core — global-section parsing identifies the mutable-i32
      __stack_pointer (resolve_sp_global); a frame-size detector recognises the
      `global.get SP; i32.const F; i32.sub` prologue (detect_frame, F else
      Unknown, ≥2 sub-sites/dynamic → Unknown); compute_stack_usage folds
      frame(f)+max-over-callees callees-first over the existing Tarjan-SCC
      reverse-topo order (recursion SCC → Unbounded; no mutable-i32 global →
      Bytes(0)); result on AnalysisResult.stack_usage + an Info diagnostic (NO
      WIT change → no //:scry risk). Soundness mechanized admit-free in
      proofs/rocq/StackBound.v (stack_bound_sound: any active call chain's
      frame-sum ≤ the per-function bound, over an operational push/pop
      semantics). Fixtures 12 (chain→56B) / 13 (recursion→Unbounded) / 14
      (dynamic→Unknown) + native oracles + live MC/DC corpus (proved 180→204
      mac). STILL OPEN: slice-2 (surface in WIT + wasmtime SP-peak host oracle);
      slice-3 (call_indirect target-set weighting vs whole-table ⊤).

      EVIDENCE (v1.11.0 — slice-2 per DD-016, feature STILL proposed): the bound
      is now surfaced in the component WIT result (scry.wit: stack-bound variant
      + function-stack + stack-usage records on analysis-result; wrapper
      conversion) AND the kill-criterion is LIVE. slice-2a host test decodes
      max-stack-bytes from the COMPOSED //:scry component (fixture-12→bytes(56),
      13→unbounded, 14→unknown). slice-2b: fixture-16-stack-measured
      SELF-MEASURES its runtime peak (each fn records min(min_sp, sp) via select
      into an exported global after lowering __stack_pointer); the host runs it
      in core wasmtime, reads sp_init−min_sp, and asserts the component's
      reported bound ≥ the measured peak (48≥48) — an analyzer that under-counts
      a real run now fails CI (the FEAT-021 kill-criterion made live). STILL
      OPEN: slice-3 (call_indirect target-set weighting).
    tags: [capability, stack-analysis, wcsu, resource-bound, v1.10]
    fields:
      phase: phase-2
      acceptance-criteria:
        - "Given a non-recursive Wasm component whose functions use the standard __stack_pointer prologue, When scry runs its stack-usage analysis, Then it reports a max-shadow-stack-bytes bound that is >= the true peak shadow-stack usage on every concrete execution (a sound over-approximation), with per-function frame sizes."
        - "Given a component with recursion (a call-graph SCC), an unrecognised/dynamic frame, or an unresolved call_indirect/host edge, When scry runs the analysis, Then those are reported as unbounded / unknown / out-of-scope respectively — never silently counted as zero (no unsound under-count)."
        - "KILL-CRITERION: a .wat fixture whose true peak shadow-stack usage (measured by instrumenting the __stack_pointer global in wasmtime) EXCEEDS scry's reported max-shadow-stack-bytes bound falsifies the soundness claim."
    links:
      - type: satisfies
        target: REQ-001
      - type: depends-on
        target: FEAT-006
      - type: depends-on
        target: FEAT-007
      - type: traces-to
        target: DD-016
      - type: traces-to
        target: G-005

  - id: FEAT-022
    type: feature
    title: "v1.x — Downstream-consumer call-graph/reachability output (synth footprint, VCR-MEM-001)"
    status: proposed
    description: >
      Make scry's call structure directly consumable by a downstream tool that
      must PROVE a program property fits a budget — synth's shadow-stack /
      linear-memory footprint (synth#383, VCR-MEM-001) is the first consumer
      (collab issue #51). Captures synth's three requests:
        (1) sound call graph incl. call_indirect target sets — ALREADY SHIPPED
            (FEAT-006: analysis-result.call-graph, per-site resolved-targets +
