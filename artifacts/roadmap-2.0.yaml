  - id: FEAT-016
    type: feature
    title: "v1.4 — Analyzer loop-carried octagon relational fixpoint (use the octagon, not just ship it)"
    status: implemented
    description: >
      Promote the octagon domain from shipped-algebra (FEAT-010) to
      analyzer-consumed: maintain an octagon over local/offset pairs
      across the intraprocedural fixpoint, with widening at loop headers,
      so relational constraints (e.g. i < len, base+off bounds) survive
      loop iterations — the deferred "across loop iterations" half of the
      FEAT-010 acceptance criteria. This is the first 2.0 precision leap
      and the analyzer-integration the octagon crate was built for. Miné
      strong/tight closure (AC-011) is the precision refinement to add
      here. Depends on the analyzer being executable (FEAT-013) so the
      precision win is measurable on the shipped artifact.

      EVIDENCE (v1.4.0 — slice-1 of 3 per DD-014, feature NOT yet complete):
      the prerequisite interval loop fixpoint landed. run_function_body models
      block/loop/if (empty block type) by WRITE-SET HAVOC — widening only the
      locals the region writes, preserving the rest — so loops stop scrubbing
      and loop-invariant locals survive (fixture-08; native + host soundness
      oracles). Soundness mechanized admit-free in
      proofs/rocq/WriteSetHavoc.v (havoc_sound). MC/DC proved 119→131,
      full 4→5; the live gate floor raised to 125/5. STILL OPEN (this feature
      stays proposed): slice-2 — the octagon relational product over the
      fixpoint (the AC's "constraint preserved across iterations"); slice-3 —
      Miné closure (AC-011). Loop-WRITTEN locals have no loop-carried
      precision until slice-2.

      EVIDENCE (v1.5.0 — slice-2a per DD-015, feature STILL proposed): the
      write-set havoc is replaced by a REAL iterate-then-widen interval
      fixpoint — run_function_body is a recursive structured interpreter with
      break-state accumulation (br/br_if record locals to the target label;
      block exit = fall-through ⊔ breaks; loop header = entry ⊔ back-edges,
      widened to a post-fixpoint). Loop-WRITTEN locals now CONVERGE (fixture-09:
      m → bounded [0,7], not ⊤). The i32 comparison family is lifted (no scrub
      on loop exit tests). Soundness mechanized admit-free in
      proofs/rocq/LoopFixpoint.v (loop_postfixpoint_sound). MC/DC proved
      131→155 (full-MC/DC 4 on CI/linux; platform-sensitive); gate floor
      148 proved / 3 full, calibrated to CI. STILL OPEN: slice-2b — the octagon
      product so a loop COUNTER bounded by a relation (i < n) stays bounded
      (interval-alone it still widens to ⊤); slice-3 — Miné closure.

      EVIDENCE (v1.6.0 — slice-2b-i per DD-015, feature STILL proposed): GUARD
      REFINEMENT — a peephole (try_guard_brif) recognises the
      `local.get L; i32.const C; i32.<cmp>; br_if D` exit idiom and refines L's
      interval by the guard half-space on each edge (refine_interval; signed
      comparisons only — unsigned wrap would be unsound). A narrowing phase in
      loop_region then pulls the over-widened header back to a finite bound, and
      a snapshot/restore of outer-label break-state stops the intermediate ⊤-era
      passes from poisoning the block exit. A loop COUNTER bounded by a CONSTANT
      guard now converges (fixture-10: i → bounded [0,10], hi ≤ 10, not ⊤).
      Soundness mechanized admit-free in proofs/rocq/GuardRefine.v
      (refine_sound: refinement drops no satisfying concrete state). MC/DC proved
      155→164 (mac local; CI/linux is the gate), gate floor raised to 155 proved
      / 3 full. STILL OPEN: slice-2b-ii — the octagon product for VARIABLE
      relations (i < n, n non-constant); slice-3 — Miné closure.

      EVIDENCE (v1.7.0 — slice-2b-ii PREREQUISITE per DD-015, smallest-sound-
      first; feature STILL proposed; NO analyzer behavior change): the
      analyzer-facing octagon primitives landed in crates/scry-octagon as pure
      algebra — coherence-maintaining add_diff/set_upper/set_lower, forget(k)
      (sound havoc on write), assign_const/assign_copy/assign_add_const (the
      in-place increment x_k:=x_k+c SHIFTS bounds so a relation x_k-x_n survives
      the loop body rather than being forgotten), bound_of(k) (project closed
      octagon → integer interval), and narrow. Projection rounding mechanized
      admit-free in proofs/rocq/OctagonProject.v (proj_interval_sound: 2x≤U ⇒
      x≤⌊U/2⌋ and the lower dual over-approximate). 9 γ-sweep tests falsify each
      primitive against the concrete DBM semantics. The analyzer OUTPUT is
      unchanged (octagon not yet carried through Interp). STILL OPEN: v1.8.0 —
      wire the octagon into FuncCtx/Interp (join/widen/narrow in lockstep at
      block/loop merges, transfer fns add/forget constraints, guard adds i-n≤c,
      project octagon→intervals at emission; fixture: variable-bounded counter);
      then slice-3 Miné closure.

      EVIDENCE (v1.8.0 — slice-2b-ii per DD-015; THE AC IS NOW MET → status
      implemented): the octagon is carried through the structured-CFG
      interpreter (FuncCtx.octagon, dim = #locals), joined/widened/NARROWED in
      lockstep with the intervals at every merge point (block exit; loop
      entry⊔back-edges; widen threshold; narrowing phase — octagon widening
      drops the slowly-growing i-n bound to ⊤ exactly like intervals, narrowing
      re-derives it). Relational guard refinement (try_guard_brif_rel) on
      `local.get A; local.get B; cmp; br_if` adds A-B≤c per edge; assignment
      transfers (octagon_transfer/classify_store) handle x:=c / x:=y / x:=y±c
      incl. the increment SHIFT, with FORGET-on-any-unmodelled-write as the
      soundness net; reduced product at emission (reduce_locals/inject_intervals)
      projects octagon→interval (i≤n ∧ n≤10 ⟹ i≤10, no WIT change). fixture-11
      (counter bounded by VARIABLE relation i<n, n in a local) converges to
      i=[0,10] (hi≤10) where interval+const-guard alone give ⊤ — the AC's
      "relational constraint preserved across iterations without false
      widening". Native oracle feat016_octagon_var_bounds_counter; fixture in
      the live MC/DC corpus (proved 164→180 mac, floor 155). Soundness composes
      v1.7 γ-tested primitives + OctagonProject.v projection + LoopFixpoint.v
      post-fixpoint (instantiated at the octagon transfer) + host oracle over
      all fixtures. REMAINING (precision only, NOT the AC): slice-3 Miné
      strong/tight closure (referenced-paper AC-011).

      EVIDENCE (v1.9.0 — slice-3 per DD-015, AC-011): Miné STRONG closure landed
      in scry-octagon (strong_close: Floyd-Warshall + the m[i][j] :=
      min(m[i][j], floor((m[i][ī]+m[j̄][j])/2)) tightening + re-close), deriving
      a difference bound from two unary bounds (x≤10 ∧ y≥0 ⟹ x-y≤10) that plain
      close cannot. Sound (γ-sweep concretization-preservation) + strictly more
      precise (γ-sweep precision test) + mechanized: proofs/rocq/
      OctagonStrongClose.v strong_close_step_sound (the tightening drops no
      concrete integer point, admit-free). bound_of projects through
      strong_close. HONEST SCOPE: NO analyzer output change — strong closure
      tightens difference/sum bounds, never a variable's own unary bound, and
      the analyzer projects octagon→per-variable intervals (unary), so on the
      current difference+unary corpus strong vs plain closure is invisible at
      the output (fixtures 08-11 byte-identical). The precision becomes
      observable only when a consumer reads relational bounds or the analyzer
      generates sum constraints (future work). With slice-3 landed, the octagon
      arc (slices 1/2a/2b-i/2b-ii/3) is complete; FEAT-016 implemented (could go
      verified on an assessor/qualification pass).
    tags: [capability, relational, octagon, precision, v1.4]
    fields:
      phase: phase-2
      acceptance-criteria:
        - "Given a Wasm module where two locals are related by an octagon constraint inside a loop, When scry runs the interval+octagon product, Then the relational constraint is preserved across loop iterations without false widening."
    links:
