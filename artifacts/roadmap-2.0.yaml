  - id: DD-011
    type: design-decision
    title: Close the analyzer↔composed-artifact decoupling so the shipped artifact embeds and runs the analyzer
    status: draft
    description: >
      The v1.0.1 release tail established by reproducible experiment that
      editing crates/scry-analyzer source produces a byte-identical
      composed //:scry wasm (the 4.6 KB artifact is the WASI shim, not the
      analyzer), and that analyze() has never executed in wasm form (the
      wac_compose / wasmtime-45 root-import limitation). All analyzer
      verification to date is native (host-tests against the pure crates).
      This decision governs how the 2.0 reality track closes that gap.
    fields:
      decision: >
        The shipped scry artifact shall embed the analyzer's compiled code
        and be executable end-to-end, so that (a) source changes to the
        analyzer are reflected in the released binary's hash, and (b) the
        live analyze() oracle and witness MC/DC can run against it. The
        leading approach is to ship a single self-contained analyzer
        module/component (the analyzer linking wasm-lattice's domain
        algebra as a Rust crate dependency rather than only as a separate
        wac-composed component), while retaining the two-component
        wac_compose path as the DD-008 dogfood demonstration. The exact
        mechanism is resolved in FEAT-013.
      rationale: >
        scry's entire credit story rests on the shipped artifact being the
        thing that was verified. As long as the composed binary does not
        contain the analyzer and never runs, "runnable evidence" in the
        credit dossier is aspirational, the witness MC/DC step (REQ-010)
        is unreachable, and the abstract-vs-concrete soundness oracle stays
        skipped. Fixing this is the precondition for every other 2.0
        capability being real rather than native-only — hence it leads the
        reality track.
      alternatives: >
        (a) Debug the wac_compose rebuild edge so analyzer source reaches
            //:scry while keeping the two-component split as the sole
            artifact — keeps DD-008 pure but inherits the wasmtime-45
            root-import execution block, so analyze() still cannot run.
        (b) Single self-contained analyzer module/component (the leading
            choice) — analyzer is executable and witness-measurable;
            wasm-lattice stays a reusable component for DD-004 but is also
            a crate dep of the shipped analyzer.
        (c) Standalone wasm32-wasip1 analyzer module purely as a
            witness/execution harness target, separate from the
            distributable — cheapest path to closing task #12, but leaves
            the distributable hollow, so it is a stepping stone, not the
            end state.
      source-ref: "scry memory: scry-v1-shipped.md OPEN FINDING (2026-05-30)"
    links:
      - type: satisfies
        target: REQ-009
      - type: traces-to
        target: DD-008
      - type: traces-to
        target: DD-009
      - type: traces-to
        target: DD-004
      - type: traces-to
        target: REQ-010
      - type: traces-to
        target: FEAT-013

  - id: DD-012
    type: design-decision
    title: "MC/DC strategy — extract a pure analyzer-core crate to make the real decisions instrumentable"
    status: approved
    description: >
      Structural (MC/DC) coverage of the analyzer (REQ-010, FEAT-014) must
      be measured on the analyzer's REAL decision logic, driven by the real
      corpus, not on a proxy. A v1.2 feasibility spike established the
      constraints: (1) witness instruments core Wasm MODULES only and
      rejects wasip2 components; (2) the shipped analyzer is a component
      whose analyze() is reachable only via the canonical ABI; (3) the
      analyzer's decision logic is welded to wit-bindgen (types from
      scry_analyzer_component_bindings, entry is a `Guest` impl), so it does
      not compile to a plain core module as-is; (4) at opt-level>=1 the
      wasm32-unknown-unknown linker drops DWARF line rows for inlined
      functions, which defeats witness's decision reconstruction. A
      throwaway harness instrumenting the pure scry-interval crate with
      synthetic inputs was built and rejected as measuring domain arithmetic
      in isolation rather than the analyzer over the corpus.
    fields:
      decision: >
        Extract the analyzer's wasmparser + fixpoint + transfer logic into a
        pure, bindgen-free `scry-analyze-core` crate (the same pure-crate
        pattern DD-011 used for scry-interval), leaving the component as a
        thin canonical-ABI wrapper over it. Build the core to wasm32-wasip1
        with debug=2 and #[inline(never)] on measured decisions so DWARF
        line rows survive, then drive its analyze() over the corpus fixtures
        via `witness run --invoke-with-args`.
      rationale: >
        Same lever as DD-011: a pure no_std core crate is both the shipped
        execution path (the component wraps it) and the verifiable artifact
        (witness instruments it, host tests falsify it). It makes the MC/DC
        evidence land on shipped code, not a copy, and keeps the component a
        thin marshalling shell.
      alternatives: >
        (a) instrument the pure domain crates with synthetic inputs
            (prototyped, rejected — not the analyzer, not the corpus);
        (b) teach witness to instrument components / unbundle then drive
            analyze() through a bespoke canonical-ABI wasmtime harness
            (high wiring cost, measures marshalling noise alongside logic);
        (c) extract analyzer-core (chosen) — the honest, reusable shape.
    links:
      - type: satisfies
        target: REQ-010
      - type: traces-to
        target: REQ-009
      - type: traces-to
        target: DD-011
      - type: traces-to
        target: FEAT-014

  - id: DD-013
    type: design-decision
    title: "MC/DC runs in CI as a live gate, with a published static truth-table visualisation"
    status: approved
    description: >
      FEAT-014 landed the witness MC/DC measurement over the real analyzer
      core (crates/scry-mcdc) but ran it as a release-time evidence step. To
      make REQ-010 a live oracle rather than a one-shot artifact, the
      measurement must run on every change and regress the build if structural
      coverage drops; and the truth-table evidence should be inspectable, not
      just a JSON blob.
    fields:
      decision: >
        Add a CI job (.github/workflows/ci.yml `mcdc`) that provisions witness
        + witness-viz (pinned to a witness commit for reproducibility), builds
        the scry-mcdc harness to wasm32-wasip1, runs witness instrument / run
        --invoke-all / report over the real analyzer decisions, and FAILS if
        conditions_proved or decisions_full_mcdc fall below a floor
        (crates/scry-mcdc/mcdc-gate.sh; v1.x floor = 110 proved / 4 full,
        measured 119 / 4). The same job runs `witness-viz export` to emit a
        static HTML truth-table site (index + per-decision + per-gap pages)
        uploaded as a CI artifact and publishable to GitHub Pages.
      rationale: >
        Same "live oracle, not a one-shot" principle as the soundness gate
        (FEAT-015): a coverage number in a committed file rots; a gate that
        re-measures on every change cannot. Pinning the witness rev keeps the
        floor meaningful (a witness upgrade cannot silently move the
        goalposts). The static viz makes the gap rows assessor-inspectable —
        the witness philosophy is "the truth table is the artifact, not the
        percentage".
      alternatives: >
        (a) keep MC/DC as a release-only step (rejected — REQ-010 stays a
            one-shot, regressions land silently);
        (b) a bazel rule via rules_wasm_component's witness toolchain (no
            high-level MC/DC rule exists yet; revisit when it does);
        (c) live HTMX serve mode only (not a CI artifact; static export is
            GitHub-Pages-deployable and diffable).
    links:
      - type: satisfies
        target: REQ-010
      - type: traces-to
        target: FEAT-014
      - type: traces-to
        target: DD-012
      - type: traces-to
        target: FEAT-015

  - id: DD-014
    type: design-decision
    title: "FEAT-016 approach — make the interval domain loop-aware first, then add the octagon product"
    status: proposed
    description: >
      FEAT-016 ("use the octagon, not just ship it") assumes the analyzer
      maintains a relational domain across loop iterations. But the v1.1–v1.3
      interval pass does NOT model control flow at all: Loop / Block / If /
      Br* hit the v0.2 fallback (emit UnsoundnessFallback, scrub locals to
      top). So the octagon cannot "survive loop iterations" until the
      analyzer has an intraprocedural structured-control-flow fixpoint in the
      first place. FEAT-016 is therefore three soundness-critical pieces, not
      one, and each carries a Rocq proof obligation (the current
      Soundness.v / Region.v cover only the straight-line transfer fns).
    fields:
      decision: >
        Stage FEAT-016 as three oracle-gated slices, smallest-sound-first:
        (1) v1.4.0 — a structured-control-flow INTERVAL fixpoint: model
        block/loop/if/else/end/br/br_if with a join at merge points and
        bounded iterate-then-widen at loop headers (reuse the existing
        analysis-config widening-threshold, currently only wired for the
        FEAT-007 summary phase). Loops stop scrubbing; a loop counter's
        interval stays sound and, where bounded, precise. Soundness: the
        fixpoint is a standard ascending-chain-with-widening, terminating
        and over-approximating; add the Rocq termination+soundness lemma.
        (2) v1.4.x — the OCTAGON PRODUCT: carry a scry-octagon Octagon over
        local/offset pairs alongside the interval state through that
        fixpoint, joined/widened in lockstep, so relational constraints
        (i < len, base+off) survive loops — the FEAT-016 AC proper.
        (3) v1.4.x — Miné strong/tight CLOSURE (AC-011) as the octagon
        precision refinement. Each slice ships behind the MC/DC gate
        (DD-013); new branches must keep conditions_proved above the floor.
      rationale: >
        The roadmap states the octagon AC directly, but the honest
        dependency is loops-first: a relational domain over a domain that
        scrubs on loops has nothing to relate across iterations. Splitting
        keeps each change small enough to prove sound and MC/DC-cover, and
        slice (1) is itself the larger precision leap (loops no longer
        degrade). Smallest-sound-first matches how the interval (FEAT-001)
        and summary (FEAT-007) fixpoints were landed.
      alternatives: >
        (a) octagon product in one shot over a new loop fixpoint (rejected —
            two soundness rewrites + two proof obligations entangled in one
            unverifiable step);
        (b) straight-line-only octagon first, loops later (rejected — does
            not move the FEAT-016 AC, which is entirely about loops);
        (c) model loops only in the taint pass, which already interprets
            structured control (rejected — taint control != value fixpoint;
            the AC is about interval/octagon precision).
    links:
      - type: satisfies
        target: REQ-001
      - type: traces-to
        target: FEAT-016
      - type: traces-to
        target: FEAT-010
      - type: references-paper
        target: AC-011
      - type: traces-to
        target: FEAT-001
      - type: traces-to
        target: FEAT-007
      - type: traces-to
        target: DD-013

  - id: DD-015
    type: design-decision
    title: "FEAT-016 slice-2 — octagon relational product over a true loop-body fixpoint"
    status: approved
    description: >
      Slice-1 (v1.4.0, DD-014) made the interval pass loop-aware by WRITE-SET
      HAVOC: it skips a region's body and widens the written locals to ⊤.
      That is sound but deliberately throws away loop-carried precision — and
      a relational constraint like `i < len` only exists BECAUSE of the
      loop's exit test and body transfers, so havoc-and-skip can never
      preserve it. Slice-2 (the FEAT-016 AC proper) therefore needs two
      things slice-1 omitted: (1) actually INTERPRET the loop body and
      iterate-then-widen at the loop header (the real fixpoint), and (2)
      carry a scry-octagon `Octagon` over the locals through it. There is
      also no place to OBSERVE a relational invariant: `analysis-result`
      exposes intervals/region/call-graph/summaries/taint but nothing
      relational, so the AC ("constraint preserved across iterations") is not
      testable without a decision on surfacing.
    fields:
      decision: >
        Implement slice-2 in three oracle-gated steps. (2a) Replace
        havoc-and-skip with a real intraprocedural fixpoint over the
        structured CFG: interpret the loop body, join at the header, and
        widen (existing analysis-config widening-threshold) until stable —
        terminating by the interval+octagon ascending-chain + widening
        argument. (2b) Extend FuncCtx with an `Octagon` of dimension =
        #locals, updated by the transfer functions (local.get/set copy →
        equality bounds; i32.add/sub of a constant → difference bounds; a
        br_if `i < len` exit test → add_bound on the taken/not-taken edges),
        joined/widened in lockstep with the intervals at the header.
        Soundness: the interval+octagon product is a reduced product; each
        domain is individually sound (Soundness.v / the octagon's lattice
        laws) and the product over-approximates their meet. Rocq lemma in
        slice (per DD-014). (2c) OBSERVABILITY — surface the proved
        relational facts. PREFERRED: project the octagon back to per-local
        intervals at each program point (tighten the EXISTING interval
        output where the relation bounds a local), so the precision win is
        testable through the current `invariant-bundle` with NO WIT change;
        a dedicated relational-invariant WIT field is deferred unless an
        assessor needs the explicit constraint. Miné strong/tight closure
        (AC-011) is slice-3, layered on 2b.
      rationale: >
        Loops-and-octagon-first was rejected as one step in DD-014 precisely
        to land the loop fixpoint before the relational domain; slice-2 now
        adds the relational half. Projecting the octagon to intervals for
        observability (2c) keeps slice-2 free of a WIT/spar change (and thus
        of a wac/bindgen surface change) while still making the AC
        falsifiable on the shipped artifact — the smallest honest way to
        show "the constraint survived the loop". The explicit
        relational-invariant surface is a separable later feature if the
        qualification dossier needs the constraints verbatim.
      alternatives: >
        (a) keep havoc-and-skip and only add the octagon to straight-line
            code (rejected — does not move the FEAT-016 AC, which is about
            loops);
        (b) surface octagon constraints via a new analysis-result WIT field
            now (rejected for slice-2 — pulls in a spar/AADL → WIT
            regeneration + wrapper conversion + host-decoder change; do it as
            its own feature when an assessor needs the verbatim relation);
        (c) a non-relational interval-only loop fixpoint (that is slice-2a
            alone; the octagon in 2b is what satisfies the AC).
    links:
      - type: satisfies
        target: REQ-001
      - type: traces-to
        target: FEAT-016
      - type: traces-to
