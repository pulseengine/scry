  - id: FEAT-013
    type: feature
    title: "v1.1 — Composition-gap fix: shipped artifact embeds and runs the analyzer"
    status: proposed
    description: >
      Resolve DD-011: make the distributable scry artifact contain the
      analyzer and execute end-to-end. Audit why wac_compose //:scry does
      not rebuild on scry-analyzer source changes, then ship the chosen
      mechanism (leading candidate: a single self-contained analyzer
      module/component linking wasm-lattice's domain algebra as a crate
      dependency, with the two-component wac path retained as the DD-008
      dogfood). The acceptance gate is the falsifier the open finding
      defined: a sentinel edit to the analyzer source MUST change the
      shipped artifact's hash, and analyze() MUST run on a real input
      module in wasmtime. Depends on FEAT-001 (the analyzer being fixed).
    tags: [reality, composition, v1.1]
    fields:
      phase: phase-2
      acceptance-criteria:
        - "Given a sentinel change to crates/scry-analyzer source, When the distributable artifact is rebuilt, Then its content hash changes (falsifying the v1.0.1 byte-identical finding)."
        - "Given a small Wasm input module, When analyze() is invoked on the shipped artifact in a wasmtime/kiln host, Then it returns an analysis-result rather than failing on a root-level component import."
    links:
      - type: satisfies
        target: REQ-009
      - type: traces-to
        target: DD-011
      - type: depends-on
        target: FEAT-001
      - type: traces-to
