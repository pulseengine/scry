  - id: FEAT-014
    type: feature
    title: "v1.2 — witness MC/DC on the analyzer (closes the long-standing structural-coverage gap)"
    status: proposed
    description: >
      With the analyzer executable (FEAT-013), measure modified-condition/
      decision coverage on its real decision logic with witness, driven by
      the existing scry-host-tests corpus fixtures, and emit the MC/DC
      truth-table report + a signed coverage predicate consumed by rivet.
      This discharges the structural-coverage requirement (REQ-010) and
      closes the witness step of the original feature loop, blocked since
      v0.1 by the composition gap. Gap rows in the truth table drive new
      analyzer test inputs until the safety-relevant transfer-function and
      fixpoint decisions are proved (or each residual gap is named with its
      closing row vector).

      SCOPE NOTE (2026-05-30, from a v1.2 feasibility spike — see DD-012):
      a naive route fails. witness instruments CORE modules only, but the
      analyzer ships as a wasip2 COMPONENT whose analyze() is reachable only
      through the canonical ABI; and the analyzer's decision logic is welded
      to the wit-bindgen layer (its types come from
      scry_analyzer_component_bindings; the entry is a `Guest` impl). A
      one-off harness that instruments the pure scry-interval crate with
      synthetic inputs was prototyped and DISCARDED: it measures the domain
      arithmetic in isolation, not "the analyzer over the corpus", so it
      does not honestly satisfy this AC. The faithful route (DD-012) is to
      extract the analyzer's wasmparser+fixpoint+transfer logic into a pure,
      bindgen-free `scry-analyze-core` crate (the same pure-crate pattern as
      FEAT-013's scry-interval), make the component a thin canonical-ABI
      wrapper over it, build that core to wasm32-wasip1 with debug=2 and
      #[inline(never)] on measured decisions (so DWARF line rows survive for
      witness's decision reconstruction — the unknown-unknown linker drops
      them under inlining), and drive its analyze() over the corpus fixtures
      via `witness run --invoke-with-args`. Until that extraction lands,
      REQ-010 is NOT satisfied; this feature is the extraction + the
      corpus-driven MC/DC run together.
    tags: [reality, structural-coverage, mcdc, witness, v1.2]
    fields:
      phase: phase-2
      acceptance-criteria:
        - "Given the analyzer's decision logic extracted into a pure core crate built as an instrumentable core module, and the host-test corpus fixtures as inputs, When witness runs, Then it emits an MC/DC truth table over the analyzer's real decisions with zero unresolved gap rows on the safety-relevant transfer functions (or each remaining gap is named with its closing row vector)."
        - "Given the witness run, When it completes, Then a signed coverage predicate is produced and validated by rivet as requirement-to-test evidence for REQ-010."
    links:
      - type: satisfies
        target: REQ-010
      - type: depends-on
        target: FEAT-013
      - type: depends-on
        target: DD-012

  - id: FEAT-015
    type: feature
    title: "v1.3 — Live end-to-end soundness oracle (un-skip the abstract-vs-concrete harness)"
    status: proposed
    description: >
      With analyze() executable (FEAT-013), un-skip the abstract-vs-
      concrete soundness oracle that scry-host-tests/tests/soundness.rs
      has stubbed since v0.3 (the wac/wasmtime-45 skip). Run each fixture
      under both the live analyzer and a concrete wasmtime execution, and
      mechanically assert every concrete value lies in the matching
      abstract interval/region/octagon — making the soundness kill-
      criterion total (live), not concrete-side-only. This upgrades the
      G-002 evidence from native-crate-only to a live whole-artifact
      oracle and completes FEAT-001 AC#3 as originally specified.
    tags: [reality, soundness-oracle, v1.3]
    fields:
      phase: phase-2
      acceptance-criteria:
        - "Given a corpus of input modules, When each is analyzed by the live shipped analyzer and executed concretely in wasmtime, Then every observed concrete value is ⊑-contained in the analyzer's abstract result, with no skip."
    links:
      - type: satisfies
        target: REQ-001
      - type: depends-on
        target: FEAT-013
      - type: traces-to
        target: FEAT-001
      - type: traces-to
        target: G-002

  - id: FEAT-016
    type: feature
    title: "v1.4 — Analyzer loop-carried octagon relational fixpoint (use the octagon, not just ship it)"
    status: proposed
    description: >
      Promote the octagon domain from shipped-algebra (FEAT-010) to
      analyzer-consumed: maintain an octagon over local/offset pairs
      across the intraprocedural fixpoint, with widening at loop headers,
      so relational constraints (e.g. i < len, base+off bounds) survive
      loop iterations — the deferred "across loop iterations" half of the
      FEAT-010 acceptance criteria. This is the first 2.0 precision leap
      and the analyzer-integration the octagon crate was built for. Miné
      strong/tight closure (AC-011) is the precision refinement to add
      here. Depends on the analyzer being executable (FEAT-013) so the
      precision win is measurable on the shipped artifact.
    tags: [capability, relational, octagon, precision, v1.4]
    fields:
      phase: phase-2
      acceptance-criteria:
        - "Given a Wasm module where two locals are related by an octagon constraint inside a loop, When scry runs the interval+octagon product, Then the relational constraint is preserved across loop iterations without false widening."
    links:
      - type: satisfies
        target: REQ-001
      - type: references-paper
        target: AC-011
      - type: depends-on
        target: FEAT-010
      - type: depends-on
        target: FEAT-013

