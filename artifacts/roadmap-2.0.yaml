  - id: REQ-009
    type: requirement
    title: The shipped scry artifact shall embed and execute its analyzer
    status: draft
    description: >
      The distributable scry artifact shall contain the compiled analyzer
      code and shall be executable end-to-end, such that a change to the
      analyzer source changes the released artifact's content hash and the
      analyze() entry point can be invoked on a real input module in a
      Wasm runtime. This closes the analyzer↔composed-artifact decoupling
      recorded as the v1.0.1 open finding and governed by DD-011. It is
      the precondition for live-soundness and structural-coverage evidence
      (REQ-010) to apply to the shipped artifact rather than only to native
      crate tests.
    tags: [reality, composition, executable, v1.1]
    fields:
      priority: must
      category: functional
    links:
      - type: traces-to
        target: DD-011
      - type: traces-to
        target: REQ-001
      - type: traces-to
        target: REQ-010

  - id: REQ-010
    type: requirement
    title: The analyzer's decision logic shall carry structural (MC/DC) coverage evidence
    status: draft
    description: >
      The analyzer's branch/decision logic (the transfer-function and
      fixpoint control flow) shall carry modified-condition/decision
      coverage evidence measured on the executable Wasm artifact via
      witness, surfaced as a signed truth-table report and consumed by
      rivet as requirement-to-test evidence. This is the structural-
      coverage leg of the defense-in-depth chain (the third DO-178C/DO-330
      evidence kind alongside soundness proof and host-test soundness
      oracle), and it depends on REQ-009 being met (the analyzer must
      execute to be measured).
    tags: [reality, structural-coverage, mcdc, witness, v1.2]
    fields:
      priority: should
      category: non-functional
    links:
      - type: traces-to
        target: REQ-009
      - type: traces-to
        target: REQ-005

