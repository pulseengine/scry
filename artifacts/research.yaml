  - id: MF-001
    type: market-finding
    title: "DO-178C / DO-333 names abstract interpretation as a distinct technique class alongside testing and proof"
    status: draft
    tags: [regulation, do-333, do-178c]
    description: >
      DO-333 ("Formal Methods Supplement to DO-178C") recognizes three
      formal-methods technique classes: deductive proof, model checking,
      and abstract interpretation. ISO 26262-6 §9 and IEC 61508-3 Annex B
      treat AI similarly as a credit-bearing static-analysis technique.
      A safety case relying only on testing + bounded model checking +
      deductive proof leaves the third class unstaffed. PulseEngine's
      2026-04-22 blog post "Overdoing the verification chain" makes
      exactly this point.
    fields:
      domain: aerospace
      finding-type: regulation
      source: "https://pulseengine.eu/blog/2026-04-22-overdoing-the-verification-chain/"
      confidence: high
    links:
      - type: motivates
        target: REQ-001

  - id: MF-002
    type: market-finding
    title: "No publicly available abstract interpreter for the Wasm Component Model"
    status: draft
    tags: [tool-gap, component-model]
    description: >
      Existing AI work on Wasm (Brandl et al. ECOOP 2023, Wanilla CCS
      2025, Paccamiccio et al. 2024, WasmChecker 2025) all targets the
      Core Model. The Component Model — resources, owned/borrowed
      handles, capability flow through imports, async via WasmFX-style
      effect handlers — has no published AI tooling and no mechanized
      formalization. The Menon/Wagner WAW 2025 talk states the
      formalization is in active in-house development at the spec
      authors' level. This is a real, named gap in the literature.
    fields:
      domain: iiot
      finding-type: tool-gap
      source: "https://popl25.sigplan.org/details/waw-2025-papers/4/The-WebAssembly-Component-Model"
      confidence: high
    links:
      - type: references-paper
        target: AC-009
      - type: motivates
        target: REQ-003

  - id: MF-003
    type: market-finding
    title: "Call-graph soundness in Wasm is empirically broken across all current static analyzers"
    status: draft
    tags: [pain-point, soundness]
    description: >
      Lehmann et al. (ISSTA 2023, "That's a Tough Call") showed that all
      then-existing Wasm static analyzers — including Wassail — produce
      unsound call graphs in the presence of call_indirect, which 83% of
      real Wasm binaries use, with 64% of those resolving through
      untyped memory. Any AI on fused PulseEngine components must
      address this — and an AI-based approach (per AC-008) is the
      principled fix.
    fields:
      domain: automotive
      finding-type: pain-point
      source: "https://2023.issta.org/details/issta-2023-papers/16/That-s-a-Tough-Call-A-Study-of-the-Challenges-of-Call-Graph-Construction-for-Wasm"
      confidence: high
    links:
      - type: references-paper
        target: AC-008
      - type: motivates
        target: REQ-008

  - id: MF-004
    type: market-finding
    title: "Public commitment to ship abstract interpretation in the PulseEngine stack — pulseengine.eu, 2026-04-22"
    status: draft
    tags: [commitment, internal]
    description: >
      The 2026-04-22 blog post "Overdoing the verification chain" lists
      the PulseEngine 10-layer verification stack against the six safety
      domains (DO-178C, ISO 26262, IEC 61508, EN 50128, IEC 62304, ECSS)
      and explicitly marks abstract interpretation as "❌ not yet" — the
      single missing layer. Three candidate paths are named: Astrée
      (commercial, C/Ada only), MIRAI (Meta, research-grade Rust MIR),
      and Charon-based value analysis — the first two are written up
      separately as technology-evaluations. This artifact set anchors
      that public commitment in typed traceability.
    fields:
      domain: aerospace
      finding-type: opportunity
      source: "https://pulseengine.eu/blog/2026-04-22-overdoing-the-verification-chain/"
      confidence: high
    links:
      - type: motivates
        target: REQ-001
      - type: motivates
        target: FEAT-001
