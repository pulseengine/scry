    status: draft
    tags: [abstract-interpretation, commercial, reference-point]
    description: >
      Astrée is Patrick Cousot's group's flagship industrial abstract
      interpreter, commercialized by AbsInt. Used by Airbus on flight
      control. Combines intervals, octagons, ellipsoids (for digital
      filters), and floating-point polyhedra. Proven that sound AI scales
      to safety-critical C/Ada with zero false alarms when domains are
      tuned to the code style.
